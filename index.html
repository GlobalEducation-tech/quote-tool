<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海外プログラム見積計算ツール</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a18; font-size: 14px; line-height: 1.5; }
.app { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 24px; color: #1a1a18; }
.card { background: #fff; border: 0.5px solid #ddddd8; border-radius: 12px; margin-bottom: 12px; }
.card-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 0.5px solid #ebebea; }
.card-title { font-size: 13px; font-weight: 500; color: #5c5c58; text-transform: uppercase; letter-spacing: 0.05em; }
.card-body { padding: 16px; }
.field-grid { display: grid; gap: 10px; margin-bottom: 10px; }
.g2 { grid-template-columns: 1fr 1fr; }
.g3 { grid-template-columns: 1fr 1fr 1fr; }
.g4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field label { font-size: 11px; color: #888; }
.field select, .field input { width: 100%; padding: 7px 10px; border: 0.5px solid #ddddd8; border-radius: 6px; font-size: 13px; background: #fff; color: #1a1a18; height: 34px; }
.field select:focus, .field input:focus { outline: none; border-color: #888; }
.btn { padding: 7px 14px; border: 0.5px solid #ddddd8; border-radius: 6px; background: #fff; font-size: 13px; cursor: pointer; color: #1a1a18; }
.btn:hover { background: #f5f5f3; }
.btn-primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }
.btn-primary:hover { background: #333; }
.btn-danger { color: #c0392b; border-color: #f5c6c3; }
.btn-danger:hover { background: #fff5f5; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-add { display: flex; align-items: center; gap: 6px; width: 100%; justify-content: center; padding: 10px; border: 0.5px dashed #ccc; border-radius: 8px; background: #fafafa; color: #666; font-size: 13px; cursor: pointer; margin-top: 8px; }
.btn-add:hover { background: #f0f0f0; border-color: #999; }
.course-block { border: 0.5px solid #e0e0dc; border-radius: 10px; padding: 14px; margin-bottom: 10px; background: #fafafa; }
.block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.block-label { font-size: 12px; font-weight: 500; color: #666; }
.info-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.info-badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; background: #f0f0ec; color: #555; }
.info-badge.peak { background: #fff3cd; color: #856404; }
.info-badge.weeks { background: #e8f4fd; color: #1565c0; }
.subtotal-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #f5f5f3; border-radius: 6px; margin-top: 10px; font-size: 13px; }
.subtotal-label { color: #666; }
.subtotal-value { font-weight: 500; }
.result-card { background: #fff; border: 0.5px solid #ddddd8; border-radius: 12px; overflow: hidden; margin-top: 12px; }
.result-header { background: #1a1a18; color: #fff; padding: 14px 16px; font-size: 13px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
.result-body { padding: 16px; }
.freee-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 13px; }
.freee-table th { text-align: left; font-size: 11px; color: #888; font-weight: 500; padding: 6px 8px; border-bottom: 1px solid #e0e0dc; }
.freee-table td { padding: 8px; border-bottom: 0.5px solid #f0f0ec; vertical-align: middle; }
.freee-table tr.total-row td { border-top: 1.5px solid #1a1a18; font-weight: 500; font-size: 14px; }
.freee-table tr.profit-row td { color: #166534; background: #f0fdf4; }
.freee-table tr.profit-total td { color: #166534; font-weight: 500; background: #dcfce7; }
.freee-table .amount { text-align: right; font-weight: 500; }
.section-divider { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.05em; padding: 12px 0 4px; border-top: 0.5px solid #f0f0ec; margin-top: 8px; }
.section-divider:first-child { border-top: none; padding-top: 0; margin-top: 0; }
.breakdown-line { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; color: #666; }
.breakdown-line .bv { font-weight: 500; color: #1a1a18; }
.summary-grid { display: grid; gap: 10px; margin-bottom: 16px; }
.summary-row { display: flex; justify-content: space-between; align-items: baseline; padding: 10px 14px; background: #f5f5f3; border-radius: 8px; }
.summary-row.accent { background: #1a1a18; }
.summary-row.profit-box { background: #f0fdf4; border: 0.5px solid #bbf7d0; }
.summary-label { font-size: 12px; color: #888; }
.summary-row.accent .summary-label { color: #aaa; }
.summary-row.profit-box .summary-label { color: #166534; }
.summary-value { font-size: 16px; font-weight: 500; color: #1a1a18; }
.summary-row.accent .summary-value { color: #fff; }
.summary-row.profit-box .summary-value { color: #166534; }
.fx-card { background: #f0f5ff; border: 0.5px solid #c7d7f8; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
.fx-card-title { font-size: 11px; color: #3b5bdb; font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.copy-btn { display: flex; align-items: center; gap: 6px; margin-top: 14px; width: 100%; justify-content: center; }
@media (max-width: 600px) { .g2,.g3,.g4 { grid-template-columns: 1fr; } }

/* タブ */
.tabs-bar { display:flex; gap:4px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
.tab-btn { padding:7px 14px; border:0.5px solid #ddddd8; border-radius:8px 8px 0 0; background:#f5f5f3; font-size:12px; cursor:pointer; color:#666; white-space:nowrap; max-width:200px; overflow:hidden; text-overflow:ellipsis; }
.tab-btn.active { background:#fff; border-bottom-color:#fff; color:#1a1a18; font-weight:500; border-color:#1565c0; border-bottom:2px solid #fff; }
.tab-btn:hover:not(.active) { background:#ebebea; }
.tab-add-btn { padding:7px 12px; border:0.5px dashed #ccc; border-radius:8px; background:#fafafa; font-size:12px; cursor:pointer; color:#888; }
.tab-add-btn:hover { background:#f0f0f0; }
.tab-content { border:0.5px solid #ddddd8; border-radius:0 12px 12px 12px; background:#fff; padding:16px; margin-bottom:12px; }

/* 比較表 */
.compare-table { width:100%; border-collapse:collapse; font-size:12px; }
.compare-table th { padding:8px 10px; background:#1a1a18; color:#fff; font-weight:500; text-align:right; }
.compare-table th:first-child { text-align:left; }
.compare-table td { padding:7px 10px; border-bottom:0.5px solid #f0f0ec; text-align:right; }
.compare-table td:first-child { text-align:left; color:#555; }
.compare-table tr.section-row td { background:#f5f5f3; font-weight:500; color:#1a1a18; padding-top:10px; }
.compare-table tr.total-row td { border-top:1.5px solid #1a1a18; font-weight:600; font-size:13px; }
.compare-table tr.profit-row td { background:#f0fdf4; color:#166534; font-weight:500; }</style>
</head>
<body>
<div class="app">
  <h1>海外プログラム見積計算ツール</h1>

  <!-- 案件ライブラリ -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">案件ライブラリ</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" onclick="exportExcel()">Excel出力</button>
        <button class="btn btn-sm btn-danger" onclick="clearAllQuotes()">全件削除</button>
      </div>
    </div>
    <div class="card-body" id="saved-quotes-list" style="max-height:400px;overflow-y:auto">
      <div style="font-size:13px;color:#999;text-align:center;padding:8px 0">保存済みの案件はありません</div>
    </div>
  </div>

  <!-- クライアント情報 -->
  <div class="card">
    <div class="card-header"><span class="card-title">クライアント・案件情報</span></div>
    <div class="card-body">
      <div class="field-grid g3">
        <div class="field"><label>クライアント名</label><input type="text" id="client-name" placeholder="例：栗田工業株式会社"></div>

        <div class="field"><label>見積日</label><input type="date" id="quote-date"></div>
      </div>
      <div class="field-grid g3">
        <div class="field">
          <label>派遣者年齢</label>

            <option value="13">13歳</option>
            <option value="14">14歳</option>
            <option value="15">15歳</option>
            <option value="16">16歳</option>
            <option value="17">17歳</option>
            <option value="18">18歳</option>
            <option value="19">19歳</option>
            <option value="20">20歳</option>
            <option value="21">21歳</option>
            <option value="22">22歳</option>
            <option value="23">23歳</option>
            <option value="24">24歳</option>
            <option value="25">25歳</option>
            <option value="26">26歳</option>
            <option value="27">27歳</option>
            <option value="28">28歳</option>
            <option value="29">29歳</option>
            <option value="30">30歳</option>
            <option value="35">35歳</option>
            <option value="40">40歳</option>

            <option value="50">50歳</option>

      </div>
      <div class="field-grid g4">
        <div class="field"><label>作成者</label><input type="text" id="author-name" placeholder="担当者名"></div>
        <div class="field"><label>作成日</label><input type="date" id="author-date"></div>
        <div class="field"><label>確認者</label><input type="text" id="reviewer-name" placeholder="確認者名"></div>

  <!-- TTS（為替レート） -->
  <div class="card">
    <div class="card-header"><span class="card-title">TTS（電信売相場）</span><a href="https://www.murc-kawasesouba.jp/fx/index.php" target="_blank" style="font-size:12px;color:#fff;background:#1a1a18;padding:5px 12px;border-radius:6px;text-decoration:none;font-weight:500">三菱UFJリサーチ&コンサルティング で確認 ↗</a></div>

<script src="school_data.js"></script>
<script>
// ===================== DATA（学校データはschool_data.jsに移動） =====================

// PRICE_YEAR管理
const PRICE_YEARS = {};

// 年度判定（school_data.jsのPRICE_YEARS_OVERRIDEを参照）
function getPriceYear(schoolKey, campusKey, startDate) {
  const override = (typeof PRICE_YEARS_OVERRIDE !== "undefined") ? PRICE_YEARS_OVERRIDE : {};
  const available = override[schoolKey]?.[campusKey] || PRICE_YEARS[schoolKey]?.[campusKey] || [2026];
  if (!startDate) return available[available.length-1];
  const yr = new Date(startDate).getFullYear();
  if (available.includes(yr)) return yr;
  return available[available.length-1];
}

function getPriceYearLabel(schoolKey, campusKey, startDate) {
  const override = (typeof PRICE_YEARS_OVERRIDE !== "undefined") ? PRICE_YEARS_OVERRIDE : {};
  const available = override[schoolKey]?.[campusKey] || PRICE_YEARS[schoolKey]?.[campusKey] || [2026];
  if (!startDate) return `${available[available.length-1]}年版`;
  const yr = new Date(startDate).getFullYear();
  if (available.includes(yr)) return `${yr}年版`;
  const latest = available[available.length-1];
  return `${latest}年版 ⚠️ ※${yr}年版未入力`;
}

// 全学校・キャンパスに2026年版として登録（school_data.jsのSCHOOLSを使用）
Object.entries(SCHOOLS).forEach(([sk, sv]) => {
  PRICE_YEARS[sk] = {};
  Object.keys(sv.campuses).forEach(ck => { PRICE_YEARS[sk][ck] = [2026]; });
});


function onNationalityChange() {
  const val = document.getElementById("person-nationality").value;
  const lbl = document.getElementById("nationality-extra-label");
  const content = document.getElementById("nationality-extra-content");
  if (val==="foreign") {
    lbl.textContent="国名";
    content.innerHTML=`<input type="text" id="person-country" placeholder="例：韓国" style="width:100%;padding:7px 10px;border:0.5px solid #ddddd8;border-radius:6px;font-size:13px;height:34px">`;
  } else if (val==="unknown") {
    lbl.textContent="　";
    content.innerHTML=`<div style="font-size:12px;color:#856404;background:#fff3cd;padding:7px 10px;border-radius:6px;line-height:1.5">国籍不明の場合、ビザ申請費用は<br>外国籍（¥300,000）で計算してください</div>`;
  } else {
    lbl.textContent="　";
    content.innerHTML="";
  }
}


// 国リストを動的生成（SCHOOLSから）
function getCountryList() {
  const countries = {};
  Object.entries(SCHOOLS).forEach(([sk, sv]) => {
    Object.values(sv.campuses).forEach(cv => {
      if (cv.country) countries[cv.country] = true;
    });
  });
  return Object.keys(countries).sort();
}

let schoolSections = [];  // 現在アクティブなタブの学校セクション
let ssIdx = 0, cIdx=0, aIdx=0, dIdx=0, plIdx=0;

// ===================== TABS =====================
let tabs = [];      // [{ id, name, schoolSections, result }]
let activeTabIdx = 0;
let tabIdx = 0;

function newTabData() {
  return { id: ++tabIdx, name: "新規案", schoolSections: [], result: null };
}

function getActiveTab() { return tabs[activeTabIdx]; }

function syncTabSections() {
  // 現在の入力をアクティブタブに同期
  if (tabs[activeTabIdx]) tabs[activeTabIdx].schoolSections = schoolSections;
}

function switchTab(idx) {
  syncTabSections();
  activeTabIdx = idx;
  schoolSections = tabs[activeTabIdx].schoolSections;
  renderTabs();
  renderSchoolSections();
  calcAll();
}

function addTab() {
  syncTabSections();
  const t = newTabData();
  tabs.push(t);
  activeTabIdx = tabs.length - 1;
  schoolSections = tabs[activeTabIdx].schoolSections;
  renderTabs();
  renderSchoolSections();
  calcAll();
}

function removeTab(idx) {
  if (tabs.length <= 1) return;
  tabs.splice(idx, 1);
  activeTabIdx = Math.min(activeTabIdx, tabs.length - 1);
  schoolSections = tabs[activeTabIdx].schoolSections;
  renderTabs();
  renderSchoolSections();
  calcAll();
}

function getTabName(t) {
  if (!t.schoolSections || t.schoolSections.length === 0) return "新規案";
  // 学校名を抽出
  const names = [];
  t.schoolSections.forEach(s => {
    if (s.school && SCHOOLS[s.school]) {
      const schoolName = SCHOOLS[s.school].name;
      // 週数を取得（全コースの最大週数）
      const weeks = s.courses.reduce((max, c) => Math.max(max, parseInt(c.weeks)||0), 0);
      names.push(weeks > 0 ? `${shortName(schoolName)} ${weeks}週` : shortName(schoolName));
    }
  });
  return names.length > 0 ? names.join(" / ") : "新規案";
}

function shortName(name) {
  // 長い学校名を短縮
  return name
    .replace("International House", "IH")
    .replace("Languages International", "LI")
    .replace("Converse International School of Languages", "CISL")
    .replace("UCI Division of Continuing Education", "UCI")
    .replace("USH (Universal Student Housing)", "USH")
    .replace("LSI Portsmouth (IH Portsmouth)", "LSI Portsmouth")
    .replace("inlingua School of Languages Singapore", "inlingua SG")
    .replace("International House Bangkok", "IH Bangkok")
    .replace("GrandLine (フィリピン留学)", "GrandLine")
    .replace("ELC (English Language Company) Malaysia", "ELC Malaysia");
}

function renderTabs() {
  const bar = document.getElementById("tabs-bar");
  bar.innerHTML = tabs.map((t, i) => `
    <div style="display:flex;align-items:stretch;gap:0">
      <button class="tab-btn ${i===activeTabIdx?"active":""}" onclick="switchTab(${i})" title="${getTabName(t)}">${getTabName(t)}</button>
      ${tabs.length > 1 ? `<button onclick="removeTab(${i})" style="padding:4px 6px;border:0.5px solid #ddddd8;border-left:none;border-radius:0 8px 8px 0;background:${i===activeTabIdx?"#fff":"#f5f5f3"};font-size:10px;cursor:pointer;color:#aaa" title="この案を削除">✕</button>` : ""}
    </div>
  `).join("") + `<button class="tab-add-btn" onclick="addTab()">＋ 案を追加</button>`;

  // 比較ボタン表示
  const compareBtn = document.getElementById("compare-btn");
  if (compareBtn) compareBtn.style.display = tabs.length > 1 ? "inline-block" : "none";
}

// ===================== 比較表 =====================
function showCompare() {
  syncTabSections();
  const modal = document.getElementById("compare-modal");
  const content = document.getElementById("compare-content");

  // 全タブのresultを計算
  const results = tabs.map((t, i) => {
    const r = t.result;
    const name = getTabName(t);
    return { name, result: r };
  }).filter(x => x.result);

  if (results.length === 0) {
    content.innerHTML = `<div style="color:#888;text-align:center;padding:20px">各案を入力して計算してください</div>`;
    modal.style.display = "block";
    return;
  }

  // 比較表を構築
  const cols = results.length;
  let html = `<div style="overflow-x:auto"><table class="compare-table">`;
  html += `<thead><tr>
    <th style="min-width:160px">項目</th>
    ${results.map(r=>`<th style="min-width:120px">${r.name}</th>`).join("")}
  </tr></thead><tbody>`;

  // 海外PG費用（学校ごとに展開）
  html += `<tr class="section-row"><td colspan="${cols+1}">海外プログラム費用</td></tr>`;

  // 全タブの学校ラベルを収集
  const allLabels = [];
  results.forEach(r => {
    r.result.freeeLines.filter(l=>!l.isJPY).forEach(l => {
      if (!allLabels.includes(l.label)) allLabels.push(l.label);
    });
  });
  allLabels.forEach(label => {
    html += `<tr><td style="padding-left:16px;color:#555">${label}</td>`;
    results.forEach(r => {
      const l = r.result.freeeLines.find(x=>!x.isJPY&&x.label===label);
      html += `<td>${l ? fmt(l.jpy) : "—"}</td>`;
    });
    html += `</tr>`;
  });

  // コーディネーション
  html += `<tr class="section-row"><td>コーディネーション費用</td>`;
  results.forEach(r => { html += `<td>${r.result.coord>0?fmt(r.result.coord):"—"}</td>`; });
  html += `</tr>`;

  // ビザ
  html += `<tr class="section-row"><td>ビザ申請費用</td>`;
  results.forEach(r => { html += `<td>${r.result.visa>0?fmt(r.result.visa):"—"}</td>`; });
  html += `</tr>`;

  // その他（円建てAdd-ons）
  const hasOther = results.some(r => (r.result.jpyAddons||[]).length > 0);
  if (hasOther) {
    html += `<tr class="section-row"><td>その他費用</td>`;
    results.forEach(r => {
      const total = (r.result.jpyAddons||[]).reduce((s,a)=>s+a.jpy,0);
      html += `<td>${total>0?fmt(total):"—"}</td>`;
    });
    html += `</tr>`;
  }

  // 合計
  html += `<tr class="total-row"><td>合計</td>`;
  results.forEach(r => { html += `<td>${fmt(r.result.total)}</td>`; });
  html += `</tr>`;

  // 粗利
  html += `<tr class="profit-row"><td>粗利</td>`;
  results.forEach(r => { html += `<td>${fmt(r.result.grossProfit)}</td>`; });
  html += `</tr>`;

  html += `</tbody></table></div>`;
  content.innerHTML = html;
  modal.style.display = "block";
}

function updateSection(sid, field, val) {
  const s = schoolSections.find(x=>x.id===sid);
  if (!s) return;
  if (field==="country") {
    s.country=val; s.school=""; s.campus="";
    // 各アイテムの国・学校もリセット
    s.courses.forEach(b=>{b.country=val;b.school="";b.campus="";b.course="";});
    s.accoms.forEach(b=>{b.country=val;b.school="";b.campus="";b.accom="";});
    s.privLessons.forEach(b=>{b.school="";b.campus="";});
  } else if (field==="school") {
    s.school=val; s.campus="";
    if (val&&SCHOOLS[val]) {
      const keys=Object.keys(SCHOOLS[val].campuses);
      if (keys.length===1) s.campus=keys[0];
    }
    // 各アイテムにも学校を反映
    s.courses.forEach(b=>{b.country=s.country;b.school=val;b.campus=s.campus;b.course="";});
    s.accoms.forEach(b=>{b.country=s.country;b.school=val;b.campus=s.campus;b.accom="";});
    s.privLessons.forEach(b=>{b.school=val;b.campus=s.campus;b.pricePerLesson=PRIVATE_LESSON_PRICES[val]?.[s.campus]||null;});
  } else if (field==="campus") {
    s.campus=val;
    s.courses.forEach(b=>{b.campus=val;b.course="";});
    s.accoms.forEach(b=>{b.campus=val;b.accom="";});
    s.privLessons.forEach(b=>{b.campus=val;b.pricePerLesson=PRIVATE_LESSON_PRICES[s.school]?.[val]||null;});
  } else if (field==="coord"||field==="visaType") {
    s[field] = field==="coord" ? parseInt(val)||0 : val;
    s.visa = field==="visaType" ? (val==="300000b"?300000:parseInt(val)||0) : s.visa;
  } else {
    s[field] = parseFloat(val)||0;
  }
  renderSchoolSections(); calcAll();
}

function getFxRate(currency) {

}

function getSchoolCurrency(schoolKey) {

}

function getFxRate(currency) {
  const rates = {
    GBP: parseFloat(document.getElementById("fx-gbp").value)||200,

    CAD: parseFloat(document.getElementById("fx-cad")?.value)||115,

    JPY: 1,
  };
  return rates[currency] || 1;
}

function calcWeeks(s, e) {
  if (!s||!e) return null;
  const start=new Date(s), end=new Date(e);
  if (end<=start) return null;
  const days=(end-start)/86400000;
  const total=Math.round(days/7);
  const yr=start.getFullYear();
  const ps=new Date(yr+"-06-22"), pe=new Date(yr+"-08-22");
  const os=start>ps?start:ps, oe=end<pe?end:pe;
  const peakDays=oe>os?(oe-os)/86400000:0;
  const peak=Math.round(peakDays/7);
  return { total, peak, normal:Math.max(0,total-peak) };
}

function hasChristmas(s, e) {
  if (!s||!e) return false;
  const start=new Date(s), end=new Date(e);
  const yr=start.getFullYear();
  const xmas=new Date(yr+"-12-25");
  return xmas>=start && xmas<end;
}

function calcIHSummerWeeks(s, e) {
  if (!s||!e) return 0;
  const start=new Date(s), end=new Date(e);
  const yr=start.getFullYear();
  const ps=new Date(yr+"-06-15"), pe=new Date(yr+"-08-29");
  const os=start>ps?start:ps, oe=end<pe?end:pe;
  if (oe<=os) return 0;
  return Math.round((oe-os)/86400000/7);
}

function calcCustomSummerWeeks(s, e, peakStartMMDD, peakEndMMDD) {
  if (!s||!e||!peakStartMMDD||!peakEndMMDD) return 0;
  const start=new Date(s), end=new Date(e);
  const yr=start.getFullYear();
  const ps=new Date(yr+"-"+peakStartMMDD), pe=new Date(yr+"-"+peakEndMMDD);
  const os=start>ps?start:ps, oe=end<pe?end:pe;
  if (oe<=os) return 0;
  return Math.round((oe-os)/86400000/7);
}

function getPrice(prices, brackets, weeks) {
  let idx=0;
  for (let i=0;i<brackets.length;i++) { if (weeks>=brackets[i]) idx=i; }
  return prices[idx];
}

// 日付を直近の月曜日に補正
function snapToMonday(dateStr) {
  if (!dateStr) return dateStr;
  const d = new Date(dateStr);
  const day = d.getDay();
  if (day === 1) return dateStr;
  const diff = day === 0 ? 1 : (8 - day);
  d.setDate(d.getDate() + diff);
  return d.toISOString().split("T")[0];
}

// 開始日（月曜）+ 週数 → 終了日（金曜）
function addWeeks(startStr, weeks) {
  if (!startStr || !weeks) return "";
  const monday = snapToMonday(startStr);
  const d = new Date(monday);
  d.setDate(d.getDate() + Math.round(weeks) * 7 - 3);
  return d.toISOString().split("T")[0];
}

function updateCourse(id, field, val) {
  const b=courseBlocks.find(x=>x.id===id);
  if (!b) return;
  if (field==="country") {
    b.country=val; b.school=""; b.campus=""; b.course="";
  } else if (field==="school") {
    b.school=val; b.campus=""; b.course="";
    if (val && SCHOOLS[val]) {
      const campKeys = Object.keys(SCHOOLS[val].campuses);
      if (campKeys.length===1) b.campus = campKeys[0];
    }
  } else if (field==="campus") { b.campus=val; b.course=""; }
  else b[field]=val;
  if (field==="start") b.start = snapToMonday(val);
  if (b.start && b.weeks) b.end = addWeeks(b.start, b.weeks);
  renderCourses(); calcAll();
}

function fmt(n) { return Math.round(Math.round(n)/10000)+"万円"; }

function fmtC(n, currency) {
  const syms={GBP:"£",CAD:"C$",USD:"$",EUR:"€",THB:"฿",NZD:"NZ$",SGD:"S$",JPY:"¥"};

function calcAll() {
  if (schoolSections.length===0) { document.getElementById("result-section").style.display="none"; return; }

  const freeeLines = [];
  let grandTotalJPY=0, totalCommJPY=0, totalProgMarkupJPY=0, totalTTSMarkupJPY=0;
  let totalCoord=0, totalVisa=0, visaHasExtra=false;
  const allJpyAddons=[];

  schoolSections.forEach((s, si) => {
    const progMarkupPct = parseFloat(s.progMarkup)||0;
    const ttsMarkupPct  = parseFloat(s.ttsMarkup??10);
    const schoolGroups = {};

    function getGroup(schoolKey, campusKey, startDate) {
      const key = schoolKey+"__"+campusKey;
      if (!schoolGroups[key]) {
        const currency = getSchoolCurrency(schoolKey);
        const yrLabel = getPriceYearLabel(schoolKey, campusKey, startDate);
        schoolGroups[key] = {
          label: getSchoolGroupLabel(schoolKey, campusKey),
          yrLabel, currency, totalLocal:0, commissionLocal:0, items:[]
        };
      }
      return schoolGroups[key];
    }

    // COURSES（このセクション内）
    s.courses.forEach((b, i) => {
      const cd=getCampData(b.school,b.campus);
      const course=cd&&b.course?cd.courses[b.course]:null;
      if (!cd||!course) { const el=document.getElementById("c"+b.id+"-sub"); if(el) el.textContent="—"; return; }
      const currency=getSchoolCurrency(b.school);
      const w=b.start&&b.end?calcWeeks(b.start,b.end):null;
      const weeks=w?w.total:0;
      const peakWeeks=w?w.peak:0;
      const useRegFee=b.regFee==="0"?0:(cd.regFee||85);
      let subLocal=0, commLocal=0;
      let subItems=[];
      if (course.type==="grandline-fixed") {
        const t=(course.priceTable&&course.priceTable[weeks])||(weeks*(course.priceTable?.[1]||0));
        subLocal+=t; commLocal+=t*course.commission;
        subItems.push({label:`${course.name}（${weeks}週）`,local:t});
        const sspCount=Math.floor(weeks/24);
        if(sspCount>0){const ssp=sspCount*20000;subLocal+=ssp;subItems.push({label:`SSP費用 ¥20,000 × ${sspCount}回`,local:ssp});}
        if(weeks>=9){subLocal+=20000;subItems.push({label:`ACR-I ¥20,000（60日以上）`,local:20000});}
        const vext=Math.floor(weeks/8.57)-1;
        if(vext>0){const va=vext*20000;subLocal+=va;subItems.push({label:`ビザ延長 ¥20,000 × ${vext}回`,local:va});}
      } else if(course.type==="rennert-fixed"){
        const t=course.fixedPrice;subLocal+=t;commLocal+=t*course.commission;subItems.push({label:`プライベートレッスン（パッケージ）`,local:t});
      } else if(course.type==="nese"){
        const sessions=Math.max(1,Math.round(weeks/4));const cs=Math.min(sessions,12);
        const t=course.nesePrices[cs]||course.nesePrices[12];subLocal+=t;commLocal+=t*course.commission;
        subItems.push({label:`授業料（${cs}セッション）`,local:t});
        const tb=175*cs;subLocal+=tb;subItems.push({label:`テキスト代`,local:tb});
      } else if(course.type==="elc"){
        const pw=getPrice(course.prices,course.brackets,weeks);const t=pw*weeks;
        subLocal+=t;commLocal+=t*course.commission;subItems.push({label:`授業料 ${fmtC(pw,currency)}/週 × ${weeks}週`,local:t});
        if(cd.peakStart&&cd.peakSupp>0){const sw=calcCustomSummerWeeks(b.start,b.end,cd.peakStart,cd.peakEnd);if(sw>0){const ss=cd.peakSupp*sw;subLocal+=ss;commLocal+=ss*course.commission;subItems.push({label:`サマーサプリメント × ${sw}週`,local:ss});}}
      } else if(course.type==="wse"){
        const pw=course.weeklyPrices[Math.min(weeks,36)]||course.weeklyPrices[36];const t=pw*weeks;
        subLocal+=t;commLocal+=t*course.commission;subItems.push({label:`授業料 £${pw}/週 × ${weeks}週`,local:t});
      } else if(course.type==="wse-1to1"){
        const lessons=parseInt(b.lessons||10);const t=course.pricePerLesson*lessons*weeks;
        subLocal+=t;commLocal+=t*course.commission;subItems.push({label:`1to1 × ${lessons}回 × ${weeks}週`,local:t});
      } else if(course.type==="wse-fixed"){
        const t=course.fixedPrice*(course.fixedWeeks||1);subLocal+=t;commLocal+=t*course.commission;subItems.push({label:`授業料（固定）`,local:t});
      } else if(course.type==="1to1"){
        const hrs=parseFloat(b.hours||20);const t=course.pricePerHour*hrs*weeks;
        subLocal+=t;commLocal+=t*course.commission;subItems.push({label:`授業料 @ ${fmtC(course.pricePerHour,currency)}/h × ${hrs}h × ${weeks}週`,local:t});
      } else if(course.type==="ih-fixed"){
        const rw=[4,8,12,16,20].reduce((p,c)=>Math.abs(c-weeks)<Math.abs(p-weeks)?c:p);
        const t=course.fixedPrices[rw]||course.fixedPrices[4];subLocal+=t;commLocal+=t*course.commission;subItems.push({label:`授業料（${rw}週パッケージ）`,local:t});
        const ihsw=calcIHSummerWeeks(b.start,b.end);if(ihsw>0&&cd.peakSupp>0){const ss=cd.peakSupp*ihsw;subLocal+=ss;commLocal+=ss*course.commission;subItems.push({label:`サマーサプリメント × ${ihsw}週`,local:ss});}
        const mf=Math.min(10*weeks,160);subLocal+=mf;subItems.push({label:`マテリアルフィー`,local:mf});
      } else if(course.fixedWeeks){
        const t=course.prices[0];subLocal+=t;commLocal+=t*course.commission;subItems.push({label:`授業料（${course.fixedWeeks}週固定）`,local:t});
      } else {
        const pw=getPrice(course.prices,course.brackets,weeks);const t=pw*weeks;
        let ps=0;
        if(b.school==="ih"){const ihsw=calcIHSummerWeeks(b.start,b.end);ps=cd.peakSupp*ihsw;if(ihsw>0)subItems.push({label:`サマーサプリメント × ${ihsw}週`,local:ps});const mf=Math.min(10*weeks,160);subItems.push({label:`マテリアルフィー`,local:mf});subLocal+=mf;}
        else{ps=cd.peakSupp*peakWeeks;if(peakWeeks>0)subItems.push({label:`ハイシーズン割増 × ${peakWeeks}週`,local:ps});}
        subLocal+=t+ps;commLocal+=(t+ps)*course.commission;subItems.push({label:`授業料 ${fmtC(pw,currency)}/週 × ${weeks}週`,local:t});
      }
      if(useRegFee>0){subItems.push({label:`登録費`,local:useRegFee});subLocal+=useRegFee;}
      if(b.school==="manhattan"){subLocal+=75;subItems.push({label:`マテリアルフィー`,local:75});}
      if(b.school==="rennert"&&course.type!=="rennert-fixed"){subLocal+=69;subItems.push({label:`スタディマテリアル`,local:69});}

      // 教材費の自動計算（school_data.jsのmaterialsFeeを使用）
      if (cd.materialsFee && course.type!=="1to1" && course.type!=="wse-1to1") {
        const mf = cd.materialsFee;
        let matAmt = 0;
        if (mf.type === "fixed") {
          matAmt = mf.fee;
        } else if (mf.type === "bracket") {
          for (const br of mf.brackets) {
            if (weeks <= br.maxWeeks) { matAmt = br.fee; break; }
          }
        }
        if (matAmt > 0) {
          subLocal += matAmt;
          subItems.push({ label:`教材費（自動）`, local:matAmt });
        }
      }
      const grp=getGroup(b.school,b.campus,b.start);
      grp.items.push({section:`コース ${i+1}: ${course.name}`,lines:subItems,subtotal:subLocal});
      grp.totalLocal+=subLocal;grp.commissionLocal+=commLocal;
      const el=document.getElementById("c"+b.id+"-sub");if(el)el.textContent=fmtC(subLocal,currency);
    });

    // ACCOMS（このセクション内）
    s.accoms.forEach((b, i) => {
      const cd=getCampData(b.school,b.campus);const accom=cd&&b.accom?cd.accom[b.accom]:null;
      if(!cd||!accom||b.accom==="none"){const el=document.getElementById("a"+b.id+"-sub");if(el)el.textContent="—";return;}
      const currency=getSchoolCurrency(b.school);
      const w=b.start&&b.end?calcWeeks(b.start,b.end):null;
      const weeks=b.weeks?parseInt(b.weeks):(w?w.total:0);
      const peakWeeks=w?Math.min(weeks,w.peak):0;
      const normalWeeks=Math.max(0,weeks-peakWeeks);
      let subLocal=0;let subItems=[];
      const base=accom.low*normalWeeks+(accom.peak||accom.low)*peakWeeks;
      if(accom.useNese){const sess=Math.max(1,Math.round(weeks/4));const cs=Math.min(sess,12);const nt=accom.nesePrices[cs]||accom.nesePrices[12];subLocal+=nt;subItems.push({label:`宿泊（${cs}セッション）`,local:nt});}
      else{subLocal+=base;subItems.push({label:`宿泊 × ${weeks}週${peakWeeks>0?` (ピーク${peakWeeks}週)`:""}`,local:base});}
      if(accom.placementFee){subLocal+=accom.placementFee;subItems.push({label:`Accommodation Placement Fee`,local:accom.placementFee});}
      if(b.school==="ih"){if(accom.bookingFee){subLocal+=accom.bookingFee;subItems.push({label:`Booking Fee`,local:accom.bookingFee});}if(accom.ihSummerSupp){const ihsw=calcIHSummerWeeks(b.start,b.end);if(ihsw>0){const ss=accom.ihSummerSupp*ihsw;subLocal+=ss;subItems.push({label:`夏季サプリメント × ${ihsw}週`,local:ss});}}}
      if(b.school==="wse"&&accom.low>0&&!accom.halfBoard){subLocal+=60;subItems.push({label:`First week supplement`,local:60});}
      if(b.school==="wse"&&hasChristmas(b.start,b.end)){subLocal+=80;subItems.push({label:`Christmas supplement`,local:80});}
      if(b.school!=="wse"&&b.school!=="ih"&&hasChristmas(b.start,b.end)){subLocal+=38;subItems.push({label:`Christmas supplement`,local:38});}
      if(["elc_brighton","elc_chester","elc_eastbourne"].includes(b.school)){const campD=getCampData(b.school,b.campus);if(campD?.peakStart){const esw=calcCustomSummerWeeks(b.start,b.end,campD.peakStart,campD.peakEnd);if(esw>0&&campD.peakSupp>0){subLocal+=campD.peakSupp*esw;subItems.push({label:`サマーサプリメント × ${esw}週`,local:campD.peakSupp*esw});}}if(hasChristmas(b.start,b.end)&&accom.halfBoard){subLocal+=50;subItems.push({label:`Christmas supplement`,local:50});}}
      if(b.school==="manhattan"){const mhsw=calcCustomSummerWeeks(b.start,b.end,"06-09","09-20");if(mhsw>0){subLocal+=30*mhsw;subItems.push({label:`夏季サプリメント × ${mhsw}週`,local:30*mhsw});}}
      if(b.school==="rennert"&&accom.rennertSummer){const rsw=calcCustomSummerWeeks(b.start,b.end,"06-01","08-31");if(rsw>0){subLocal+=35*rsw;subItems.push({label:`サマーサプリメント × ${rsw}週`,local:35*rsw});}if(hasChristmas(b.start,b.end)){subLocal+=50;subItems.push({label:`Christmas supplement`,local:50});}}
      if(b.dietWeeks&&parseInt(b.dietWeeks)>0){const dr=b.school==="wse"?50:(b.school==="manhattan"?0:33);if(dr>0){const d=dr*parseInt(b.dietWeeks);subLocal+=d;subItems.push({label:`特別食追加 × ${b.dietWeeks}週`,local:d});}}
      const grp=getGroup(b.school,b.campus);
      grp.items.push({section:`宿泊 ${i+1}: ${accom.name}`,lines:subItems,subtotal:subLocal});grp.totalLocal+=subLocal;
      const el=document.getElementById("a"+b.id+"-sub");if(el)el.textContent=fmtC(subLocal,currency);
    });

    // PRIVATE LESSONS（このセクション内）
    s.privLessons.forEach((b, i) => {
      if(!b.lessons||!b.pricePerLesson){const el=document.getElementById("pl"+b.id+"-sub");if(el)el.textContent="—";return;}
      // 学校はセクション側の設定を使う
      const schoolKey = b.school || s.school;
      const campusKey = b.campus || s.campus;
      const currency=getSchoolCurrency(schoolKey);
      const total=parseFloat(b.pricePerLesson)*parseInt(b.lessons);
      const grp=getGroup(schoolKey, campusKey, null);
      grp.items.push({section:`個人レッスン ${i+1}: ${b.lessons}回`,lines:[{label:`${b.lessons}回 × ${fmtC(b.pricePerLesson,currency)}`,local:total}],subtotal:total});
      grp.totalLocal+=total; grp.commissionLocal+=total*0.25;
      const el=document.getElementById("pl"+b.id+"-sub");if(el)el.textContent=fmtC(total,currency);
    });

    // ADDONS（このセクション内）
    s.addons.forEach((b, i) => {
      let subLocal=0,currency=getSchoolCurrency(s.school)||"GBP";let subItems=[];
      const qty=parseFloat(b.qty||1);
      const glPrices={"gl-fieldwork":18000,"gl-dinner":15000,"gl-lunch":15000,"gl-speaking":12000,"gl-lesson":3000,"gl-night":7000};
      const glLabels={"gl-fieldwork":"フィールドワーク","gl-dinner":"ディナーセッション","gl-lunch":"ランチセッション","gl-speaking":"パブリックスピーキング","gl-lesson":"追加レッスン","gl-night":"延泊"};
      if(b.type==="action-learning"){const amtJPY=150000*qty;const el=document.getElementById("d"+b.id+"-sub");if(el)el.textContent=fmtJPY(amtJPY);b._jpyTotal=amtJPY;b._label=`アクションラーニングプロジェクト × ${qty}`;allJpyAddons.push({label:b._label,jpy:amtJPY,type:b.type});return;}

      // NYU SPS・AMA（USD建て・上乗せ可）
      const usdFixed = {"nyu-sps":1500,"ama-3day":3200,"ama-5day":4400};
      const usdLabels = {"nyu-sps":"NYU SPS","ama-3day":"AMA 3 Day","ama-5day":"AMA 5 Day"};
      if(usdFixed[b.type]){
        const baseUSD = usdFixed[b.type] * qty * (1+(parseFloat(b.markupPct)||0)/100);
        const label = `${usdLabels[b.type]}${b.markupPct>0?` (+${b.markupPct}%)`:""}`;
        const el=document.getElementById("d"+b.id+"-sub");if(el)el.textContent=fmtC(baseUSD,"USD");
        // USD建てグループに追加（TTS・上乗せ適用）
        const gKey="__usd_addon_"+s.id+"__";
        if(!schoolGroups[gKey]) schoolGroups[gKey]={label:`オプション費用（学校 ${si+1}）`,yrLabel:"",currency:"USD",totalLocal:0,commissionLocal:0,items:[]};
        schoolGroups[gKey].items.push({section:`Add-on: ${usdLabels[b.type]}`,lines:[{label,local:baseUSD}],subtotal:baseUSD});
        schoolGroups[gKey].totalLocal+=baseUSD;
        return;
      }
      if(glPrices[b.type]){const amtJPY=glPrices[b.type]*qty;const el=document.getElementById("d"+b.id+"-sub");if(el)el.textContent=fmtJPY(amtJPY);b._jpyTotal=amtJPY;b._label=`GrandLine ${glLabels[b.type]} × ${qty}`;allJpyAddons.push({label:b._label,jpy:amtJPY,type:b.type});return;}
      if(b.type==="jpy-other"){const amtJPY=(parseFloat(b.amountJPY)||0)*qty;const el=document.getElementById("d"+b.id+"-sub");if(el)el.textContent=fmtJPY(amtJPY);b._jpyTotal=amtJPY;b._label=b.desc||"その他費用";allJpyAddons.push({label:b._label,jpy:amtJPY,type:b.type});return;}
      if(b.type==="transfer"){const cd=getCampData(s.school,s.campus);const price=cd&&b.airport?(cd.airports[b.airport]||0):0;subLocal=price*qty;subItems.push({label:`${b.airport||"空港"}`,local:subLocal});if(s.school&&s.campus){const grp=getGroup(s.school,s.campus);grp.items.push({section:`空港送迎 ${i+1}`,lines:subItems,subtotal:subLocal});grp.totalLocal+=subLocal;}}
      else{currency=b.currency||getSchoolCurrency(s.school)||"GBP";subLocal=(parseFloat(b.amount)||0)*qty;subItems.push({label:b.desc||b.type,local:subLocal});if(s.school&&s.campus){const grp=getGroup(s.school,s.campus);grp.items.push({section:`Add-on: ${b.desc||b.type}`,lines:subItems,subtotal:subLocal});grp.totalLocal+=subLocal;}}
      const el=document.getElementById("d"+b.id+"-sub");if(el)el.textContent=fmtC(subLocal,currency);
    });

    // schoolGroupsをfreeeLineに変換（このセクション分）
    Object.entries(schoolGroups).forEach(([key,grp]) => {
      const tts=getFxRate(grp.currency);
      const effectiveFX=tts*(1+ttsMarkupPct/100);
      const costJPY=grp.totalLocal*tts;
      const ttsGainJPY=grp.totalLocal*(effectiveFX-tts);
      const progGainJPY=costJPY*(progMarkupPct/100);
      const programFee=Math.round(costJPY+ttsGainJPY+progGainJPY);
      const commJPY=Math.round(grp.commissionLocal*tts);
      grandTotalJPY+=programFee;totalCommJPY+=commJPY;
      totalProgMarkupJPY+=Math.round(progGainJPY);totalTTSMarkupJPY+=Math.round(ttsGainJPY);
      freeeLines.push({label:`海外プログラム費用（${grp.label}）`,jpy:programFee,currency:grp.currency,local:grp.totalLocal,tts,effectiveFX,costJPY,ttsGainJPY,progGainJPY,items:grp.items,commJPY,progMarkupPct,ttsMarkupPct});
    });

    // コーディネーション・ビザ（セクションごと）
    if(s.coord>0){totalCoord+=s.coord;freeeLines.push({label:`コーディネーション費用（学校 ${si+1}）`,jpy:s.coord,isJPY:true});}
    const sVisa=s.visaType==="300000b"?300000:(parseInt(s.visaType)||0);
    if(sVisa>0){totalVisa+=sVisa;if(s.visaType==="300000b")visaHasExtra=true;freeeLines.push({label:`ビザ申請費用（学校 ${si+1}）${s.visaType==="300000b"?" *":""}`,jpy:sVisa,isJPY:true});}
  }); // end schoolSections.forEach

  // 円建てAdd-ons
  allJpyAddons.forEach(a=>{freeeLines.push({label:a.label,jpy:a.jpy,isJPY:true});grandTotalJPY+=a.jpy;});

  const totalAll=grandTotalJPY+totalCoord+totalVisa;
  const jpyOtherTotal=allJpyAddons.filter(a=>a.type==="jpy-other").reduce((s,a)=>s+a.jpy,0);
  const actionLearningTotal=allJpyAddons.filter(a=>a.type==="action-learning").reduce((s,a)=>s+a.jpy,0);
  const glOptTotal=allJpyAddons.filter(a=>a.type&&a.type.startsWith("gl-")).reduce((s,a)=>s+a.jpy,0);
  const grossProfit=totalCommJPY+totalCoord+jpyOtherTotal+actionLearningTotal+glOptTotal+totalTTSMarkupJPY+totalProgMarkupJPY;

  if(freeeLines.length===0){document.getElementById("result-section").style.display="none";return;}

  // freeeテーブル更新
  let tbodyHtml="";
  freeeLines.forEach(l => {
    if(!l.isJPY){
      tbodyHtml+=`<tr style="background:#f0f5ff"><td colspan="4" style="padding:10px 8px;font-size:13px;font-weight:600;color:#1565c0">🏫 ${l.label}</td></tr>`;
      l.items&&l.items.forEach(item=>{item.lines&&item.lines.forEach(ln=>{tbodyHtml+=`<tr><td style="padding:6px 8px 6px 20px;font-size:12px;color:#444">${ln.label}</td><td style="text-align:center;font-size:12px">1名</td><td style="text-align:right;font-size:12px">${fmt(Math.round(ln.local*(l.tts||1)))}</td><td style="text-align:right;font-size:12px">${fmt(Math.round(ln.local*(l.tts||1)))}</td></tr>`;});});
      tbodyHtml+=`<tr style="background:#e8f0fe"><td colspan="2" style="padding:8px 8px 8px 20px;font-size:13px;font-weight:600">小計（${l.label}）</td><td></td><td style="text-align:right;font-size:13px;font-weight:600">${fmt(l.jpy)}</td></tr>`;
    } else {
      tbodyHtml+=`<tr><td style="padding:8px">${l.label}</td><td style="text-align:center">1名</td><td style="text-align:right">${fmt(l.jpy)}</td><td style="text-align:right">${fmt(l.jpy)}</td></tr>`;
    }
  });
  tbodyHtml+=`<tr class="total-row" style="background:#1a1a18"><td colspan="2" style="padding:14px 8px;font-size:16px;font-weight:700;color:#fff">合計</td><td></td><td style="text-align:right;font-size:18px;font-weight:700;color:#fff">${fmt(totalAll)}</td></tr>`;
  document.getElementById("freee-tbody").innerHTML=tbodyHtml;
  document.getElementById("r-profit").textContent=fmt(grossProfit);

  // 内訳
  let html="";
  freeeLines.filter(l=>!l.isJPY).forEach(l=>{
    html+=`<div class="section-divider">${l.label}</div>`;
    html+=`<div class="breakdown-line"><span>原価合計 (${l.currency})</span><span class="bv">${fmtC(l.local,l.currency)}</span></div>`;
    html+=`<div class="breakdown-line"><span>× TTS ${l.tts} → 実効レート ${l.effectiveFX.toFixed(2)}（TTS+${l.ttsMarkupPct||0}%）</span><span class="bv">${fmt(l.costJPY+l.ttsGainJPY)}</span></div>`;
    if((l.progMarkupPct||0)>0)html+=`<div class="breakdown-line"><span>プログラム上乗せ +${l.progMarkupPct}%</span><span class="bv">${fmt(l.progGainJPY)}</span></div>`;
    html+=`<div class="breakdown-line" style="font-weight:500"><span>→ 海外プログラム費用</span><span class="bv">${fmt(l.jpy)}</span></div>`;
    l.items.forEach(item=>{html+=`<div style="margin:6px 0 2px;font-size:11px;color:#999;text-transform:uppercase;">${item.section}</div>`;item.lines.forEach(ln=>{html+=`<div class="breakdown-line" style="padding-left:8px"><span>${ln.label}</span><span class="bv">${fmtC(ln.local,l.currency)}</span></div>`;});});
  });
  html+=`<div class="section-divider">粗利内訳</div>`;
  html+=`<div class="breakdown-line"><span>コミッション（授業料 × コミッション率）</span><span class="bv" style="color:#166534">${fmt(totalCommJPY)}</span></div>`;
  if(totalCoord>0)html+=`<div class="breakdown-line"><span>コーディネーション費用合計</span><span class="bv" style="color:#166534">${fmt(totalCoord)}</span></div>`;
  allJpyAddons.filter(a=>(a.jpy||0)>0).forEach(a=>{html+=`<div class="breakdown-line"><span>${a.label}</span><span class="bv" style="color:#166534">${fmt(a.jpy)}</span></div>`;});
  html+=`<div class="breakdown-line" style="font-weight:500;padding-top:6px;border-top:0.5px solid #bbf7d0"><span style="color:#166534">粗利合計</span><span class="bv" style="color:#166534">${fmt(grossProfit)}</span></div>`;
  if(visaHasExtra)html+=`<div style="font-size:11px;color:#888;margin-top:8px">* 翻訳等の実費は別途ご請求</div>`;
  document.getElementById("breakdown").innerHTML=html;
  document.getElementById("result-section").style.display="";

  window._lastResult={
    freeeLines,coord:totalCoord,visa:totalVisa,total:totalAll,grossProfit,
    coordSchools:schoolSections.filter(s=>s.coord>0).length,
    visaNote:visaHasExtra,totalCommJPY,totalProgMarkupJPY,totalTTSMarkupJPY,
    progMarkupPct: schoolSections.map(s=>parseFloat(s.progMarkup)||0).join("/"),
    ttsMarkupPct:  schoolSections.map(s=>parseFloat(s.ttsMarkup??10)).join("/"),
    client:document.getElementById("client-name").value,
    project:document.getElementById("project-name").value,
    quoteDate:document.getElementById("quote-date").value,
    gbpTTS:parseFloat(document.getElementById("fx-gbp").value)||200,
    usdTTS:parseFloat(document.getElementById("fx-usd").value)||155,
    jpyAddons:allJpyAddons,
  };

  // アクティブタブにresultを保存・タブ名を更新
  if (tabs[activeTabIdx]) {
    tabs[activeTabIdx].result = window._lastResult;
    tabs[activeTabIdx].schoolSections = schoolSections;
    renderTabs();
  }
}
function copyResult() {
  if (!window._lastResult) return;
  const r=window._lastResult;
  const lines=[];
  r.freeeLines.forEach(l => {
    lines.push(`${l.label}\t1名\t${Math.round(l.jpy).toLocaleString("ja-JP")}円\t${Math.round(l.jpy).toLocaleString("ja-JP")}円`);
  });
  lines.push(`合計\t\t\t${Math.round(r.total).toLocaleString("ja-JP")}円`);
  navigator.clipboard.writeText(lines.join("\n")).then(()=>{
    const btn=document.querySelector(".copy-btn");
    const orig=btn.textContent;
    btn.textContent="コピーしました！";
    setTimeout(()=>btn.textContent=orig, 2000);
  });
}

const STORAGE_KEY = "getc_projects_v1";

function loadProjects() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]"); } catch(e) { return []; }
}
function saveProjects(projects) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
}

function saveQuote() {
  // 現在のタブを同期
  syncTabSections();

  const client = document.getElementById("client-name").value || "（未設定）";
  const project = document.getElementById("project-name").value || "（未設定）";
  const date = document.getElementById("quote-date").value || new Date().toISOString().split("T")[0];

  // 既存案件の更新チェック
  const projects = loadProjects();
  const existingIdx = projects.findIndex(p => p.client===client && p.project===project);

  const projectData = {
    id: existingIdx >= 0 ? projects[existingIdx].id : Date.now(),
    client, project, date,
    // クライアント情報
    age: document.getElementById("person-age").value || "",
    nationality: document.getElementById("person-nationality").value || "",
    country: (document.getElementById("person-country")||{}).value || "",
    author: document.getElementById("author-name").value || "",
    authorDate: document.getElementById("author-date").value || "",
    reviewer: document.getElementById("reviewer-name").value || "",
    reviewerDate: document.getElementById("reviewer-date").value || "",
    // TTS
    fx: {
      gbp: parseFloat(document.getElementById("fx-gbp").value)||200,
      cad: parseFloat(document.getElementById("fx-cad").value)||110,
      usd: parseFloat(document.getElementById("fx-usd").value)||155,
      eur: parseFloat(document.getElementById("fx-eur").value)||165,
      nzd: parseFloat(document.getElementById("fx-nzd").value)||88,
      thb: parseFloat(document.getElementById("fx-thb").value)||4.3,
      sgd: parseFloat(document.getElementById("fx-sgd").value)||115,
    },
    // 全タブのデータ
    tabs: tabs.map(t => ({
      id: t.id,
      name: getTabName(t),
      schoolSections: t.schoolSections,
      result: t.result ? {
        freeeLines: t.result.freeeLines,
        coord: t.result.coord,
        visa: t.result.visa,
        total: t.result.total,
        grossProfit: t.result.grossProfit,
        jpyAddons: t.result.jpyAddons||[],
      } : null,
    })),
    savedAt: new Date().toISOString(),
  };

  if (existingIdx >= 0) {
    if (!confirm(`「${client} / ${project}」はすでに保存されています。上書きしますか？`)) return;
    projects[existingIdx] = projectData;
  } else {
    projects.unshift(projectData);
  }
  saveProjects(projects);
  renderSavedQuotes();
  alert(`「${client} / ${project}」を保存しました`);
}

function loadProject(id) {
  const projects = loadProjects();
  const p = projects.find(x=>x.id===id);
  if (!p) return;

  // クライアント情報を復元
  document.getElementById("client-name").value = p.client || "";
  document.getElementById("project-name").value = p.project || "";
  document.getElementById("quote-date").value = p.date || "";
  document.getElementById("person-age").value = p.age || "unknown";
  document.getElementById("person-nationality").value = p.nationality || "japanese";
  document.getElementById("author-name").value = p.author || "";
  document.getElementById("author-date").value = p.authorDate || "";
  document.getElementById("reviewer-name").value = p.reviewer || "";
  document.getElementById("reviewer-date").value = p.reviewerDate || "";
  onNationalityChange();

  // TTS復元
  if (p.fx) {
    if(document.getElementById("fx-gbp")) document.getElementById("fx-gbp").value = p.fx.gbp||200;
    if(document.getElementById("fx-cad")) document.getElementById("fx-cad").value = p.fx.cad||110;
    if(document.getElementById("fx-usd")) document.getElementById("fx-usd").value = p.fx.usd||155;
    if(document.getElementById("fx-eur")) document.getElementById("fx-eur").value = p.fx.eur||165;
    if(document.getElementById("fx-nzd")) document.getElementById("fx-nzd").value = p.fx.nzd||88;
    if(document.getElementById("fx-thb")) document.getElementById("fx-thb").value = p.fx.thb||4.3;
    if(document.getElementById("fx-sgd")) document.getElementById("fx-sgd").value = p.fx.sgd||115;
  }

  // タブを復元
  tabs = (p.tabs||[]).map(t => ({
    id: t.id || ++tabIdx,
    name: t.name || "案",
    schoolSections: t.schoolSections || [],
    result: t.result || null,
  }));
  if (tabs.length === 0) tabs = [newTabData()];
  activeTabIdx = 0;
  schoolSections = tabs[0].schoolSections;

  renderTabs();
  renderSchoolSections();
  calcAll();

  // 画面上部にスクロール
  document.querySelector(".app").scrollIntoView({behavior:"smooth"});
}

function deleteQuote(id) {
  if (!confirm("この案件を削除しますか？")) return;
  const projects = loadProjects().filter(p=>p.id!==id);
  saveProjects(projects);
  renderSavedQuotes();
}

function clearAllQuotes() {
  if (!confirm("全件削除しますか？")) return;
  localStorage.removeItem(STORAGE_KEY);
  renderSavedQuotes();
}

function renderSavedQuotes() {
  const el = document.getElementById("saved-quotes-list");
  const projects = loadProjects();
  if (projects.length===0) {
    el.innerHTML=`<div style="font-size:13px;color:#999;text-align:center;padding:8px 0">保存済みの案件はありません</div>`;
    return;
  }
  el.innerHTML = projects.map(p => {
    const tabNames = (p.tabs||[]).map(t=>t.name||"案").join("　／　");
    const totalMax = Math.max(...(p.tabs||[]).filter(t=>t.result).map(t=>t.result.total||0), 0);
    const savedAt = p.savedAt ? new Date(p.savedAt).toLocaleDateString("ja-JP") : p.date;
    return `<div style="border:0.5px solid #e0e0dc;border-radius:10px;padding:12px 14px;margin-bottom:8px;background:#fafafa">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;color:#1a1a18;margin-bottom:2px">${p.client}　<span style="color:#666;font-weight:400">${p.project}</span></div>
          <div style="font-size:11px;color:#888;margin-bottom:6px">保存日: ${savedAt}</div>
          <div style="font-size:11px;color:#555;line-height:1.8">
            ${(p.tabs||[]).map(t=>{
              const r = t.result;
              return `<span style="display:inline-block;background:#f0f5ff;border-radius:4px;padding:2px 8px;margin:2px 4px 2px 0;color:#1565c0">${t.name||"案"}${r?` • ${fmt(r.total)}`:" • 未計算"}</span>`;
            }).join("")}
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0;align-items:center">
          <button class="btn btn-sm btn-primary" onclick="loadProject(${p.id})">開く</button>
          <button class="btn btn-sm btn-danger" onclick="deleteQuote(${p.id})">削除</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

function toggleAllQuotes(checked) {
  document.querySelectorAll(".quote-checkbox").forEach(cb=>cb.checked=checked);
}

// 現在の見積をExcelで出力
function exportCurrentExcel() {
  syncTabSections();
  const client = document.getElementById("client-name").value || "見積";
  const project = document.getElementById("project-name").value || "";
  const date = document.getElementById("quote-date").value || new Date().toISOString().split("T")[0];
  const targets = tabs.filter(t=>t.result).map(t=>({
    client, project, date,
    tabName: getTabName(t),
    freeeLines: t.result.freeeLines,
    coord: t.result.coord,
    visa: t.result.visa,
    total: t.result.total,
    grossProfit: t.result.grossProfit,
    totalCommJPY: t.result.totalCommJPY||0,
    progMarkupPct: t.result.progMarkupPct||0,
    ttsMarkupPct: t.result.ttsMarkupPct||0,
    gbpTTS: t.result.gbpTTS||0,
    usdTTS: t.result.usdTTS||0,
    jpyAddons: t.result.jpyAddons||[],
    coordSchools: t.result.coordSchools||0,
  }));
  if (targets.length===0) { alert("先に計算してください"); return; }
  _exportToExcel(targets, `GETC_見積_${client}_${date}`);
}

function exportSelectedExcel(all=false) {
  const projects = loadProjects();
  if (projects.length===0) { alert("保存済みの案件がありません"); return; }
  const targets = [];
  projects.forEach(p => {
    (p.tabs||[]).filter(t=>t.result).forEach(t => {
      targets.push({
        client: p.client, project: p.project, date: p.date,
        tabName: t.name||"案",
        freeeLines: t.result.freeeLines||[],
        coord: t.result.coord||0,
        visa: t.result.visa||0,
        total: t.result.total||0,
        grossProfit: t.result.grossProfit||0,
        jpyAddons: t.result.jpyAddons||[],
      });
    });
  });
  if (targets.length===0) { alert("計算済みの案件がありません"); return; }
  _exportToExcel(targets, `GETC_見積一覧_${new Date().toISOString().split("T")[0]}`);
}

function exportExcel() { exportSelectedExcel(true); }

function _exportToExcel(targets, filename) {
  let rows = [];

  targets.forEach((q, qi) => {
    if (qi > 0) { rows.push([]); rows.push([]); }

    // ── 見積ヘッダー ──────────────────────────────────────
    rows.push([`■ 見積書　${q.client}　${q.project}　${q.date}`]);
    rows.push([`プログラム上乗せ率: ${q.progMarkupPct||0}%`, `TTS上乗せ率: ${q.ttsMarkupPct||0}%`]);
    rows.push([]);

    // ── 学校ごとの詳細 ────────────────────────────────────
    q.freeeLines && q.freeeLines.forEach(l => {
      if (l.isJPY) return; // 円建てはあとでまとめて出力

      const cur = l.currency || "GBP";
      const tts = l.tts || 1;
      const effRate = l.effectiveFX || tts;
      const lTtsPct = l.ttsMarkupPct ?? 0;
      const lProgPct = l.progMarkupPct ?? 0;

      // 学校ヘッダー
      rows.push([`▼ ${l.label}`]);
      rows.push([`　TTS上乗せ: ${lTtsPct}%　プログラム上乗せ: ${lProgPct}%　計算レート: ${Math.round(effRate*100)/100}`]);
      rows.push(["　項目", "外貨金額", "通貨", "TTS", `計算レート(TTS+${lTtsPct}%)`, "円換算（原価）", "円換算（計算レート適用）"]);

      // 明細行
      l.items && l.items.forEach(item => {
        rows.push([`　【${item.section}】`]);
        item.lines && item.lines.forEach(ln => {
          const localAmt = ln.local || 0;
          const jpyCost = Math.round(localAmt * tts);
          const jpyCalc = Math.round(localAmt * effRate);
          rows.push([
            `　　${ln.label}`,
            localAmt,
            cur,
            tts,
            Math.round(effRate * 100) / 100,
            jpyCost,
            jpyCalc,
          ]);
        });
      });

      // TTS差益・プログラム上乗せ
      if (l.ttsGainJPY > 0) {
        rows.push([`　TTS上乗せ差益 (+${lTtsPct}%)`, "", "", "", "", "", Math.round(l.ttsGainJPY)]);
      }
      if (l.progGainJPY > 0) {
        rows.push([`　プログラム上乗せ (+${lProgPct}%)`, "", "", "", "", "", Math.round(l.progGainJPY)]);
      }

      // 学校小計
      rows.push([`　▶ ${l.label} 小計`, "", cur, tts, Math.round(effRate*100)/100, Math.round(l.costJPY), Math.round(l.jpy)]);
      rows.push([]);
    });

    // ── 円建て費用 ────────────────────────────────────────
    const jpyLines = [];
    if ((q.coord||0) > 0) jpyLines.push([`コーディネーション費用（${q.coordSchools}校）`, "", "JPY", 1, 1, q.coord, q.coord]);
    if ((q.visa||0) > 0)  jpyLines.push([`ビザ申請費用`, "", "JPY", 1, 1, q.visa, q.visa]);
    q.jpyAddons && q.jpyAddons.forEach(a => {
      jpyLines.push([a.label, "", "JPY", 1, 1, a.jpy, a.jpy]);
    });
    if (jpyLines.length > 0) {
      rows.push(["▼ 円建て費用"]);
      rows.push(["　項目", "", "通貨", "", "", "金額（円）", "金額（円）"]);
      jpyLines.forEach(r => rows.push(r));
      rows.push([]);
    }

    // ── 合計・粗利 ────────────────────────────────────────
    rows.push(["★ 見積合計", "", "", "", "", "", Math.round(q.total)]);
    rows.push(["　うちコミッション（授業料×コミッション率）", "", "", "", "", "", Math.round(q.totalCommJPY||0)]);
    rows.push(["　うちTTS上乗せ差益", "", "", "", "", "", Math.round(q.totalTTSMarkupJPY||0)]);
    rows.push(["　うちプログラム上乗せ益", "", "", "", "", "", Math.round(q.totalProgMarkupJPY||0)]);
    if ((q.coord||0) > 0) rows.push(["　うちコーディネーション", "", "", "", "", "", q.coord]);
    rows.push(["★ 粗利合計", "", "", "", "", "", Math.round(q.grossProfit)]);
    rows.push([]);
  });

  // ── CSV出力（BOM付きUTF-8） ───────────────────────────
  const csvContent = "\uFEFF" + rows
    .map(row => row.map(v => `"${String(v||"").replace(/"/g,'""')}"`).join(","))
    .join("\r\n");

  const blob = new Blob([csvContent], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${filename}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
