<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海外プログラム見積計算ツール</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a18; font-size: 14px; line-height: 1.5; }
.app { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 24px; color: #1a1a18; }
.card { background: #fff; border: 0.5px solid #ddddd8; border-radius: 12px; margin-bottom: 12px; }
.card-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 0.5px solid #ebebea; }
.card-title { font-size: 13px; font-weight: 500; color: #5c5c58; text-transform: uppercase; letter-spacing: 0.05em; }
.card-body { padding: 16px; }
.field-grid { display: grid; gap: 10px; margin-bottom: 10px; }
.g2 { grid-template-columns: 1fr 1fr; }
.g3 { grid-template-columns: 1fr 1fr 1fr; }
.g4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field label { font-size: 11px; color: #888; }
.field select, .field input { width: 100%; padding: 7px 10px; border: 0.5px solid #ddddd8; border-radius: 6px; font-size: 13px; background: #fff; color: #1a1a18; height: 34px; }
.field select:focus, .field input:focus { outline: none; border-color: #888; }
.btn { padding: 7px 14px; border: 0.5px solid #ddddd8; border-radius: 6px; background: #fff; font-size: 13px; cursor: pointer; color: #1a1a18; }
.btn:hover { background: #f5f5f3; }
.btn-primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }
.btn-primary:hover { background: #333; }
.btn-danger { color: #c0392b; border-color: #f5c6c3; }
.btn-danger:hover { background: #fff5f5; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-add { display: flex; align-items: center; gap: 6px; width: 100%; justify-content: center; padding: 10px; border: 0.5px dashed #ccc; border-radius: 8px; background: #fafafa; color: #666; font-size: 13px; cursor: pointer; margin-top: 8px; }
.btn-add:hover { background: #f0f0f0; border-color: #999; }
.course-block { border: 0.5px solid #e0e0dc; border-radius: 10px; padding: 14px; margin-bottom: 10px; background: #fafafa; }
.block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.block-label { font-size: 12px; font-weight: 500; color: #666; }
.info-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.info-badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; background: #f0f0ec; color: #555; }
.info-badge.peak { background: #fff3cd; color: #856404; }
.info-badge.weeks { background: #e8f4fd; color: #1565c0; }
.subtotal-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #f5f5f3; border-radius: 6px; margin-top: 10px; font-size: 13px; }
.subtotal-label { color: #666; }
.subtotal-value { font-weight: 500; }
.result-card { background: #fff; border: 0.5px solid #ddddd8; border-radius: 12px; overflow: hidden; margin-top: 12px; }
.result-header { background: #1a1a18; color: #fff; padding: 14px 16px; font-size: 13px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
.result-body { padding: 16px; }
.freee-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 13px; }
.freee-table th { text-align: left; font-size: 11px; color: #888; font-weight: 500; padding: 6px 8px; border-bottom: 1px solid #e0e0dc; }
.freee-table td { padding: 8px; border-bottom: 0.5px solid #f0f0ec; vertical-align: middle; }
.freee-table tr.total-row td { border-top: 1.5px solid #1a1a18; font-weight: 500; font-size: 14px; }
.freee-table tr.profit-row td { color: #166534; background: #f0fdf4; }
.freee-table tr.profit-total td { color: #166534; font-weight: 500; background: #dcfce7; }
.freee-table .amount { text-align: right; font-weight: 500; }
.section-divider { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.05em; padding: 12px 0 4px; border-top: 0.5px solid #f0f0ec; margin-top: 8px; }
.section-divider:first-child { border-top: none; padding-top: 0; margin-top: 0; }
.breakdown-line { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; color: #666; }
.breakdown-line .bv { font-weight: 500; color: #1a1a18; }
.summary-grid { display: grid; gap: 10px; margin-bottom: 16px; }
.summary-row { display: flex; justify-content: space-between; align-items: baseline; padding: 10px 14px; background: #f5f5f3; border-radius: 8px; }
.summary-row.accent { background: #1a1a18; }
.summary-row.profit-box { background: #f0fdf4; border: 0.5px solid #bbf7d0; }
.summary-label { font-size: 12px; color: #888; }
.summary-row.accent .summary-label { color: #aaa; }
.summary-row.profit-box .summary-label { color: #166534; }
.summary-value { font-size: 16px; font-weight: 500; color: #1a1a18; }
.summary-row.accent .summary-value { color: #fff; }
.summary-row.profit-box .summary-value { color: #166534; }
.fx-card { background: #f0f5ff; border: 0.5px solid #c7d7f8; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
.fx-card-title { font-size: 11px; color: #3b5bdb; font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.copy-btn { display: flex; align-items: center; gap: 6px; margin-top: 14px; width: 100%; justify-content: center; }
@media (max-width: 600px) { .g2,.g3,.g4 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="app">
  <h1>海外プログラム見積計算ツール</h1>

  <!-- 保存済み見積もり -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">保存済み見積もり</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" onclick="exportExcel()">Excel一覧を出力</button>
        <button class="btn btn-sm btn-danger" onclick="clearAllQuotes()">全件削除</button>
      </div>
    </div>
    <div class="card-body" id="saved-quotes-list" style="max-height:320px;overflow-y:auto">
      <div style="font-size:13px;color:#999;text-align:center;padding:8px 0">保存済みの見積もりはありません</div>
    </div>
  </div>

  <!-- クライアント情報 -->
  <div class="card">
    <div class="card-header"><span class="card-title">クライアント・案件情報</span></div>
    <div class="card-body">
      <div class="field-grid g3">
        <div class="field"><label>クライアント名</label><input type="text" id="client-name" placeholder="例：栗田工業株式会社"></div>
        <div class="field"><label>案件名</label><input type="text" id="project-name" placeholder="例：2027年度若手海外語学留学"></div>
        <div class="field"><label>見積日</label><input type="date" id="quote-date"></div>
      </div>
      <div class="field-grid g3">
        <div class="field">
          <label>派遣者年齢</label>
          <input type="number" id="person-age" min="16" max="70" placeholder="例：25">
        </div>
        <div class="field">
          <label>派遣者国籍</label>
          <select id="person-nationality" onchange="onNationalityChange()">
            <option value="">選択してください</option>
            <option value="japanese">日本国籍</option>
            <option value="foreign">外国籍（国名を入力）</option>
            <option value="unknown">不明</option>
          </select>
        </div>
        <div class="field" id="nationality-extra-field">
          <label id="nationality-extra-label">　</label>
          <div id="nationality-extra-content"></div>
        </div>
      </div>
      <div class="field-grid g4">
        <div class="field"><label>作成者</label><input type="text" id="author-name" placeholder="担当者名"></div>
        <div class="field"><label>作成日</label><input type="date" id="author-date"></div>
        <div class="field"><label>確認者</label><input type="text" id="reviewer-name" placeholder="確認者名"></div>
        <div class="field"><label>確認日</label><input type="date" id="reviewer-date"></div>
      </div>
    </div>
  </div>

  <!-- TTS（為替レート） -->
  <div class="card">
    <div class="card-header"><span class="card-title">TTS（電信売相場）</span><a href="https://www.murc-kawasesouba.jp/fx/index.php" target="_blank" style="font-size:12px;color:#fff;background:#1a1a18;padding:5px 12px;border-radius:6px;text-decoration:none;font-weight:500">三菱UFJリサーチ&コンサルティング で確認 ↗</a></div>
    <div class="card-body">
      <div class="field-grid g4">
        <div class="field"><label>GBP / JPY（TTS）</label><input type="number" id="fx-gbp" value="200" min="50" max="400" oninput="calcAll()"></div>
        <div class="field"><label>CAD / JPY（TTS）</label><input type="number" id="fx-cad" value="110" min="50" max="300" oninput="calcAll()"></div>
        <div class="field"><label>USD / JPY（TTS）</label><input type="number" id="fx-usd" value="155" min="50" max="300" oninput="calcAll()"></div>
        <div class="field"><label>EUR / JPY（TTS）</label><input type="number" id="fx-eur" value="165" min="50" max="300" oninput="calcAll()"></div>
        <div class="field"><label>NZD / JPY（TTS）</label><input type="number" id="fx-nzd" value="88" min="30" max="200" step="0.1" oninput="calcAll()"></div>
        <div class="field"><label>THB / JPY（TTS）</label><input type="number" id="fx-thb" value="4.3" min="1" max="20" step="0.01" oninput="calcAll()"></div>
        <div class="field"><label>SGD / JPY（TTS）</label><input type="number" id="fx-sgd" value="115" min="50" max="300" oninput="calcAll()"></div>
      </div>
    </div>
  </div>

  <!-- 上乗せ・コーディネーション・ビザ -->
  <div class="card">
    <div class="card-header"><span class="card-title">上乗せ・コーディネーション・ビザ</span></div>
    <div class="card-body">
      <div class="field-grid g4">
        <div class="field">
          <label>プログラム上乗せ率（%）</label>
          <input type="number" id="prog-markup" value="0" min="0" max="100" oninput="calcAll()">
          <span style="font-size:11px;color:#888;margin-top:2px">学校原価への上乗せ（競合・年度調整）</span>
        </div>
        <div class="field">
          <label>TTS上乗せ率（%）</label>
          <input type="number" id="tts-markup" value="10" min="0" max="20" oninput="calcAll()">
          <span style="font-size:11px;color:#888;margin-top:2px">TTSへの上乗せ（為替バッファ）</span>
        </div>
        <div class="field"><label>コーディネーション費用（校数）</label>
          <select id="coord-schools" onchange="calcAll()">
            <option value="0">なし（0校）</option>
            <option value="1" selected>1校（¥150,000）</option>
            <option value="2">2校（¥300,000）</option>
            <option value="3">3校（¥450,000）</option>
            <option value="4">4校（¥600,000）</option>
            <option value="5">5校（¥750,000）</option>
          </select>
        </div>
        <div class="field"><label>ビザ申請費用</label>
          <select id="visa" onchange="calcAll()">
            <option value="0">なし</option>
            <option value="200000">米国・日本国籍（¥200,000）</option>
            <option value="250000">NZ・日本国籍（¥250,000）</option>
            <option value="300000">米国・外国籍（¥300,000）</option>
            <option value="300000b">その他・外国籍（¥300,000+実費）</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- コース -->
  <div class="card">
    <div class="card-header"><span class="card-title">コース</span></div>
    <div class="card-body">
      <div id="courses-container"></div>
      <button class="btn-add" onclick="addCourse()">＋ コースを追加</button>
    </div>
  </div>

  <!-- 宿泊 -->
  <div class="card">
    <div class="card-header"><span class="card-title">宿泊</span></div>
    <div class="card-body">
      <div id="accom-container"></div>
      <button class="btn-add" onclick="addAccom()">＋ 宿泊を追加</button>
    </div>
  </div>

  <!-- 個人レッスン -->
  <div class="card">
    <div class="card-header"><span class="card-title">個人レッスン（Add-on）</span></div>
    <div class="card-body">
      <div id="privlesson-container"></div>
      <button class="btn-add" onclick="addPrivLesson()">＋ 個人レッスンを追加</button>
    </div>
  </div>

  <!-- Add-ons -->
  <div class="card">
    <div class="card-header"><span class="card-title">Add-ons</span></div>
    <div class="card-body">
      <div id="addons-container"></div>
      <button class="btn-add" onclick="addAddon()">＋ Add-onを追加</button>
    </div>
  </div>

  <!-- 結果 -->
  <div class="result-card" id="result-section" style="display:none">
    <div class="result-header">見積結果（freee転記用）</div>
    <div class="result-body">
      <!-- freee形式テーブル -->
      <table class="freee-table" id="freee-table">
        <thead>
          <tr>
            <th style="width:50%">摘要</th>
            <th style="width:10%;text-align:center">数量</th>
            <th style="width:20%;text-align:right">単価</th>
            <th style="width:20%;text-align:right">明細金額</th>
          </tr>
        </thead>
        <tbody id="freee-tbody"></tbody>
      </table>
      <!-- 粗利ボックス -->
      <div id="profit-box" style="background:#f0fdf4;border:0.5px solid #bbf7d0;border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:#166534">粗利（コミッション＋コーディネーション＋Add-ons上乗せ）</span>
        <span style="font-size:17px;font-weight:500;color:#166534" id="r-profit">—</span>
      </div>
      <!-- 内訳 -->
      <div id="breakdown" style="margin-bottom:14px"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary copy-btn" onclick="copyResult()" style="flex:1">freee用テキストをコピー</button>
        <button class="btn" onclick="saveQuote()" style="flex:1;background:#166534;color:#fff;border-color:#166534">この見積もりを保存</button>
      </div>
    </div>
  </div>
</div>

<script src="school_data.js"></script>
<script>
// ===================== DATA（学校データはschool_data.jsに移動） =====================

// PRICE_YEAR管理
const PRICE_YEARS = {};

// 年度判定（school_data.jsのPRICE_YEARS_OVERRIDEを参照）
function getPriceYear(schoolKey, campusKey, startDate) {
  const override = (typeof PRICE_YEARS_OVERRIDE !== "undefined") ? PRICE_YEARS_OVERRIDE : {};
  const available = override[schoolKey]?.[campusKey] || PRICE_YEARS[schoolKey]?.[campusKey] || [2026];
  if (!startDate) return available[available.length-1];
  const yr = new Date(startDate).getFullYear();
  if (available.includes(yr)) return yr;
  return available[available.length-1];
}

function getPriceYearLabel(schoolKey, campusKey, startDate) {
  const override = (typeof PRICE_YEARS_OVERRIDE !== "undefined") ? PRICE_YEARS_OVERRIDE : {};
  const available = override[schoolKey]?.[campusKey] || PRICE_YEARS[schoolKey]?.[campusKey] || [2026];
  if (!startDate) return `${available[available.length-1]}年版`;
  const yr = new Date(startDate).getFullYear();
  if (available.includes(yr)) return `${yr}年版`;
  const latest = available[available.length-1];
  return `${latest}年版 ⚠️ ※${yr}年版未入力`;
}

// 全学校・キャンパスに2026年版として登録（school_data.jsのSCHOOLSを使用）
Object.entries(SCHOOLS).forEach(([sk, sv]) => {
  PRICE_YEARS[sk] = {};
  Object.keys(sv.campuses).forEach(ck => { PRICE_YEARS[sk][ck] = [2026]; });
});


function onNationalityChange() {
  const val = document.getElementById("person-nationality").value;
  const lbl = document.getElementById("nationality-extra-label");
  const content = document.getElementById("nationality-extra-content");
  if (val==="foreign") {
    lbl.textContent="国名";
    content.innerHTML=`<input type="text" id="person-country" placeholder="例：韓国" style="width:100%;padding:7px 10px;border:0.5px solid #ddddd8;border-radius:6px;font-size:13px;height:34px">`;
  } else if (val==="unknown") {
    lbl.textContent="　";
    content.innerHTML=`<div style="font-size:12px;color:#856404;background:#fff3cd;padding:7px 10px;border-radius:6px;line-height:1.5">国籍不明の場合、ビザ申請費用は<br>外国籍（¥300,000）で計算してください</div>`;
  } else {
    lbl.textContent="　";
    content.innerHTML="";
  }
}


let courseBlocks=[], accomBlocks=[], addonBlocks=[], privLessonBlocks=[];
let cIdx=0, aIdx=0, dIdx=0, plIdx=0;

// ===================== RENDER PRIVATE LESSONS =====================
function addPrivLesson() { privLessonBlocks.push({ id:++plIdx }); renderPrivLessons(); }
function removePrivLesson(id) { privLessonBlocks=privLessonBlocks.filter(b=>b.id!==id); renderPrivLessons(); calcAll(); }

function renderPrivLessons() {
  document.getElementById("privlesson-container").innerHTML = privLessonBlocks.map((b,i)=>renderPrivLessonBlock(b,i)).join("");
}

function renderPrivLessonBlock(b, i) {
  const schoolOpts=`<option value="">選択</option>`+Object.entries(SCHOOLS).map(([k,v])=>`<option value="${k}" ${b.school===k?"selected":""}>${v.name}</option>`).join("");
  let campOpts=`<option value="">選択</option>`;
  if (b.school&&SCHOOLS[b.school]) campOpts=`<option value="">選択</option>`+Object.entries(SCHOOLS[b.school].campuses).map(([k,v])=>`<option value="${k}" ${b.campus===k?"selected":""}>${v.name}</option>`).join("");
  const currency = b.school ? getSchoolCurrency(b.school) : "GBP";
  const sym = {GBP:"£",USD:"$",CAD:"C$",EUR:"€"}[currency]||"£";
  const defaultPrice = (b.school&&b.campus) ? (PRIVATE_LESSON_PRICES[b.school]?.[b.campus]||null) : null;
  const priceVal = b.pricePerLesson || defaultPrice || "";
  const priceNote = defaultPrice ? `（Price list参考: ${sym}${defaultPrice}/レッスン）` : "";

  // lessons select 1-50
  let lessonsOpts=`<option value="">選択</option>`;
  for(let n=1;n<=100;n++) lessonsOpts+=`<option value="${n}" ${parseInt(b.lessons)===n?"selected":""}>${n}回</option>`;

  return `<div class="course-block">
    <div class="block-header"><span class="block-label">個人レッスン ${i+1}</span><button class="btn btn-sm btn-danger" onclick="removePrivLesson(${b.id})">削除</button></div>
    <div class="field-grid g2">
      <div class="field"><label>学校</label><select onchange="updatePrivLesson(${b.id},'school',this.value)">${schoolOpts}</select></div>
      <div class="field"><label>キャンパス</label><select onchange="updatePrivLesson(${b.id},'campus',this.value)">${campOpts}</select></div>
    </div>
    <div class="field-grid g3">
      <div class="field">
        <label>レッスン数</label>
        <select onchange="updatePrivLesson(${b.id},'lessons',this.value)">${lessonsOpts}</select>
      </div>
      <div class="field">
        <label>単価（${sym}/レッスン）${priceNote}</label>
        <input type="number" value="${priceVal}" min="0" placeholder="${defaultPrice||0}" oninput="updatePrivLesson(${b.id},'pricePerLesson',this.value)">
      </div>
      <div class="field">
        <label>小計</label>
        <input type="text" id="pl${b.id}-sub" value="${b.lessons&&b.pricePerLesson ? fmtC(b.lessons*b.pricePerLesson,currency) : '—'}" readonly style="background:#f5f5f3;color:#888">
      </div>
    </div>
  </div>`;
}

function updatePrivLesson(id, field, val) {
  const b=privLessonBlocks.find(x=>x.id===id);
  if (!b) return;
  if (field==="school") {
    b.school=val; b.campus=""; b.pricePerLesson=null;
    if (val&&SCHOOLS[val]) {
      const keys=Object.keys(SCHOOLS[val].campuses);
      if (keys.length===1) { b.campus=keys[0]; b.pricePerLesson=PRIVATE_LESSON_PRICES[val]?.[keys[0]]||null; }
    }
  } else if (field==="campus") {
    b.campus=val;
    b.pricePerLesson=PRIVATE_LESSON_PRICES[b.school]?.[val]||null;
  } else {
    b[field]=parseFloat(val)||val;
  }
  renderPrivLessons(); calcAll();
}

// ===================== UTILS =====================
function getFxRate(currency) {
  const map = { GBP:"fx-gbp", CAD:"fx-cad", USD:"fx-usd", EUR:"fx-eur" };
  const id = map[currency] || "fx-gbp";
  return parseFloat(document.getElementById(id).value) || 1;
}

function getSchoolCurrency(schoolKey) {
  return SCHOOLS[schoolKey]?.currency || "GBP";
}

function getFxRate(currency) {
  const rates = {
    GBP: parseFloat(document.getElementById("fx-gbp").value)||200,
    USD: parseFloat(document.getElementById("fx-usd").value)||155,
    CAD: parseFloat(document.getElementById("fx-cad")?.value)||115,
    EUR: parseFloat(document.getElementById("fx-eur")?.value)||165,
    NZD: parseFloat(document.getElementById("fx-nzd")?.value)||90,
    THB: parseFloat(document.getElementById("fx-thb")?.value)||4.3,
    SGD: parseFloat(document.getElementById("fx-sgd")?.value)||115,
    JPY: 1,
  };
  return rates[currency] || 1;
}

function calcWeeks(s, e) {
  if (!s||!e) return null;
  const start=new Date(s), end=new Date(e);
  if (end<=start) return null;
  const days=(end-start)/86400000;
  const total=Math.round(days/7);
  const yr=start.getFullYear();
  const ps=new Date(yr+"-06-22"), pe=new Date(yr+"-08-22");
  const os=start>ps?start:ps, oe=end<pe?end:pe;
  const peakDays=oe>os?(oe-os)/86400000:0;
  const peak=Math.round(peakDays/7);
  return { total, peak, normal:Math.max(0,total-peak) };
}

function hasChristmas(s, e) {
  if (!s||!e) return false;
  const start=new Date(s), end=new Date(e);
  const yr=start.getFullYear();
  const xmas=new Date(yr+"-12-25");
  return xmas>=start && xmas<end;
}

function calcIHSummerWeeks(s, e) {
  if (!s||!e) return 0;
  const start=new Date(s), end=new Date(e);
  const yr=start.getFullYear();
  const ps=new Date(yr+"-06-15"), pe=new Date(yr+"-08-29");
  const os=start>ps?start:ps, oe=end<pe?end:pe;
  if (oe<=os) return 0;
  return Math.round((oe-os)/86400000/7);
}

function calcCustomSummerWeeks(s, e, peakStartMMDD, peakEndMMDD) {
  if (!s||!e||!peakStartMMDD||!peakEndMMDD) return 0;
  const start=new Date(s), end=new Date(e);
  const yr=start.getFullYear();
  const ps=new Date(yr+"-"+peakStartMMDD), pe=new Date(yr+"-"+peakEndMMDD);
  const os=start>ps?start:ps, oe=end<pe?end:pe;
  if (oe<=os) return 0;
  return Math.round((oe-os)/86400000/7);
}

function getPrice(prices, brackets, weeks) {
  let idx=0;
  for (let i=0;i<brackets.length;i++) { if (weeks>=brackets[i]) idx=i; }
  return prices[idx];
}

// 日付を直近の月曜日に補正
function snapToMonday(dateStr) {
  if (!dateStr) return dateStr;
  const d = new Date(dateStr);
  const day = d.getDay();
  if (day === 1) return dateStr;
  const diff = day === 0 ? 1 : (8 - day);
  d.setDate(d.getDate() + diff);
  return d.toISOString().split("T")[0];
}

// 開始日（月曜）+ 週数 → 終了日（金曜）
function addWeeks(startStr, weeks) {
  if (!startStr || !weeks) return "";
  const monday = snapToMonday(startStr);
  const d = new Date(monday);
  d.setDate(d.getDate() + Math.round(weeks) * 7 - 3);
  return d.toISOString().split("T")[0];
}

function calcAll() {
  const progMarkupPct = parseFloat(document.getElementById("prog-markup").value)||0;
  const ttsMarkupPct  = parseFloat(document.getElementById("tts-markup").value)||0;
  const coordSchools=parseInt(document.getElementById("coord-schools").value)||0;

  const visa=visaVal==="300000b"?300000:(parseInt(visaVal)||0);

  // schoolGroupKey -> { labelJP, currency, totalLocal, commissionLocal, items[] }
  const schoolGroups = {};

  function getGroup(schoolKey, campusKey, startDate) {
    const key = schoolKey+"__"+campusKey;
    if (!schoolGroups[key]) {
      const currency = getSchoolCurrency(schoolKey);
      const yrLabel = getPriceYearLabel(schoolKey, campusKey, startDate);
      schoolGroups[key] = {
        label: getSchoolGroupLabel(schoolKey, campusKey),
        yrLabel,
        currency,
        totalLocal: 0,
        commissionLocal: 0,
        items: []
      };
    }
    return schoolGroups[key];
  }

  // COURSES
  courseBlocks.forEach((b, i) => {
    const cd=getCampData(b.school,b.campus);
    const course=cd&&b.course?cd.courses[b.course]:null;
    if (!cd||!course) { const el=document.getElementById("c"+b.id+"-sub"); if(el) el.textContent="—"; return; }
    const currency=getSchoolCurrency(b.school);
    const w=b.start&&b.end?calcWeeks(b.start,b.end):null;
    const weeks=w?w.total:0;
    const peakWeeks=w?w.peak:0;
    const useRegFee=b.regFee==="0"?0:(cd.regFee||85);
    let subLocal=0, commLocal=0;
    let subItems=[];

    if (course.type==="grandline-fixed") {
      // GrandLine: 円建て週ごと価格テーブル
      const t = (course.priceTable && course.priceTable[weeks]) || (weeks * (course.priceTable?.[1]||0));
      subLocal+=t; commLocal+=t*course.commission;
      subItems.push({ label:`${course.name}（${weeks}週）`, local:t });
    } else if (course.type==="rennert-fixed") {
      const t = course.fixedPrice;
      subLocal+=t; commLocal+=t*course.commission;
      subItems.push({ label:`プライベートレッスン（パッケージ）`, local:t });
    } else if (course.type==="nese") {
      // NESE: 1 session = 4 weeks, price by session count
      const sessions = Math.max(1, Math.round(weeks / 4));
      const maxSessions = 12;
      const clampedSessions = Math.min(sessions, maxSessions);
      const t = course.nesePrices[clampedSessions] || course.nesePrices[maxSessions];
      subLocal+=t; commLocal+=t*course.commission;
      subItems.push({ label:`授業料（${clampedSessions}セッション = ${clampedSessions*4}週）`, local:t });
      // Textbook $175/session
      const textbook = 175 * clampedSessions;
      subLocal+=textbook;
      subItems.push({ label:`テキスト代 $175 × ${clampedSessions}セッション`, local:textbook });
    } else if (course.type==="elc") {
      // ELC: price per week based on bracket (price is per week at that tier)
      const pw = getPrice(course.prices, course.brackets, weeks);
      const t = pw * weeks;
      subLocal+=t; commLocal+=t*course.commission;
      subItems.push({ label:`授業料 ${fmtC(pw,currency)}/週 × ${weeks}週`, local:t });
      // ELC summer supplement
      if (cd.peakStart && cd.peakSupp>0) {
        const summerWks = calcCustomSummerWeeks(b.start, b.end, cd.peakStart, cd.peakEnd);
        if (summerWks>0) {
          const ss=cd.peakSupp*summerWks;
          subLocal+=ss; commLocal+=ss*course.commission;
          subItems.push({ label:`サマーサプリメント £${cd.peakSupp} × ${summerWks}週`, local:ss });
        }
      }
    } else if (course.type==="wse") {
      const pw = course.weeklyPrices[Math.min(weeks, 36)] || course.weeklyPrices[36];
      const t = pw * weeks;
      subLocal+=t; commLocal+=t*course.commission;
      subItems.push({ label:`授業料 £${pw}/週 × ${weeks}週`, local:t });
    } else if (course.type==="wse-1to1") {
      const lessons=parseInt(b.lessons||10);
      const t=course.pricePerLesson*lessons*weeks;
      subLocal+=t; commLocal+=t*course.commission;
      subItems.push({ label:`1to1 £${course.pricePerLesson}/レッスン × ${lessons}回 × ${weeks}週`, local:t });
    } else if (course.type==="wse-fixed") {
      const t=course.fixedPrice*(course.fixedWeeks||1);
      subLocal+=t; commLocal+=t*course.commission;
      subItems.push({ label:`授業料（固定）`, local:t });
    } else if (course.type==="1to1") {
      const hrs=parseFloat(b.hours||20);
      const t=course.pricePerHour*hrs*weeks;
      subLocal+=t; commLocal+=t*course.commission;
      subItems.push({ label:`授業料 @ ${fmtC(course.pricePerHour,currency)}/h × ${hrs}h × ${weeks}週`, local:t });
    } else if (course.type==="ih-fixed") {
      // IH IELTS: fixed price table by week count
      const roundedWeeks = [4,8,12,16,20].reduce((prev,curr) => Math.abs(curr-weeks)<Math.abs(prev-weeks)?curr:prev);
      const t = course.fixedPrices[roundedWeeks] || course.fixedPrices[4];
      subLocal+=t; commLocal+=t*course.commission;
      subItems.push({ label:`授業料（${roundedWeeks}週パッケージ）`, local:t });
      // IH summer supplement on group courses
      const ihSummerWeeks = calcIHSummerWeeks(b.start, b.end);
      if (ihSummerWeeks>0 && cd.peakSupp>0) {
        const ss=cd.peakSupp*ihSummerWeeks;
        subLocal+=ss; commLocal+=ss*course.commission;
        subItems.push({ label:`サマーサプリメント £${cd.peakSupp} × ${ihSummerWeeks}週`, local:ss });
      }
      // IH materials fee £10/week max £160
      const matFee=Math.min(10*weeks,160);
      subLocal+=matFee;
      subItems.push({ label:`マテリアルフィー £10/週（最大£160）`, local:matFee });
    } else if (course.fixedWeeks) {
      const t=course.prices[0];
      subLocal+=t; commLocal+=t*course.commission;
      subItems.push({ label:`授業料（${course.fixedWeeks}週固定）`, local:t });
    } else {
      const pw=getPrice(course.prices,course.brackets,weeks);
      const t=pw*weeks;
      // IH: use custom summer calc; others use standard peakSupp
      let ps=0;
      if (b.school==="ih") {
        const ihSummerWeeks=calcIHSummerWeeks(b.start,b.end);
        ps=cd.peakSupp*ihSummerWeeks;
        if (ihSummerWeeks>0) subItems.push({ label:`サマーサプリメント £${cd.peakSupp} × ${ihSummerWeeks}週`, local:ps });
        // IH materials fee
        const matFee=Math.min(10*weeks,160);
        subItems.push({ label:`マテリアルフィー £10/週（最大£160）`, local:matFee });
        subLocal+=matFee;
      } else {
        ps=cd.peakSupp*peakWeeks;
        if (peakWeeks>0) subItems.push({ label:`ハイシーズン割増 ${fmtC(cd.peakSupp,currency)} × ${peakWeeks}週`, local:ps });
      }
      subLocal+=t+ps; commLocal+=(t+ps)*course.commission;
      subItems.push({ label:`授業料 ${fmtC(pw,currency)}/週 × ${weeks}週`, local:t });
    }
    if (useRegFee>0) subItems.push({ label:`登録費`, local:useRegFee });
    subLocal+=useRegFee;
    // Manhattan: material fee $75 for new students
    if (b.school==="manhattan") { subLocal+=75; subItems.push({ label:`マテリアルフィー（新規学生）`, local:75 }); }
    // Rennert: study materials $69 (first set of books)
    if (b.school==="rennert" && course.type!=="rennert-fixed") { subLocal+=69; subItems.push({ label:`スタディマテリアル（初回）`, local:69 }); }

    const grp=getGroup(b.school,b.campus,b.start);
    grp.items.push({ section:`Course ${i+1}: ${course.name}`, lines:subItems, subtotal:subLocal });
    grp.totalLocal+=subLocal; grp.commissionLocal+=commLocal;
    const el=document.getElementById("c"+b.id+"-sub");
    if(el) el.textContent=fmtC(subLocal,currency);
  });

  // ACCOM
  accomBlocks.forEach((b, i) => {
    const cd=getCampData(b.school,b.campus);
    const accom=cd&&b.accom?cd.accom[b.accom]:null;
    if (!cd||!accom||b.accom==="none") { const el=document.getElementById("a"+b.id+"-sub"); if(el) el.textContent="—"; return; }
    const currency=getSchoolCurrency(b.school);
    const w=b.start&&b.end?calcWeeks(b.start,b.end):null;
    const weeks=b.weeks ? parseInt(b.weeks) : (w?w.total:0);
    const peakWeeks=w?Math.min(weeks,w.peak):0;
    const normalWeeks=Math.max(0,weeks-peakWeeks);
    let subLocal=0;
    let subItems=[];

    const base=accom.low*normalWeeks+(accom.peak||accom.low)*peakWeeks;
    if (accom.useNese) {
      // NESE: session-based accommodation pricing
      const sessions = Math.max(1, Math.round(weeks/4));
      const clampedSessions = Math.min(sessions, 12);
      const neseTotal = accom.nesePrices[clampedSessions] || accom.nesePrices[12];
      subLocal+=neseTotal;
      subItems.push({ label:`宿泊（${clampedSessions}セッション = ${clampedSessions*4}週）`, local:neseTotal });
    } else {
      subLocal+=base;
      subItems.push({ label:`宿泊 × ${weeks}週${peakWeeks>0?" (うちピーク"+peakWeeks+"週)":""}`, local:base });
    }
    if (accom.placementFee) { subLocal+=accom.placementFee; subItems.push({ label:`Accommodation Placement Fee`, local:accom.placementFee }); }
    // IH: booking fee + summer supplement
    if (b.school==="ih") {
      if (accom.bookingFee) { subLocal+=accom.bookingFee; subItems.push({ label:`Accommodation Booking Fee`, local:accom.bookingFee }); }
      if (accom.ihSummerSupp) {
        const ihSummerWeeks=calcIHSummerWeeks(b.start,b.end);
        if (ihSummerWeeks>0) {
          const ss=accom.ihSummerSupp*ihSummerWeeks;
          subLocal+=ss; subItems.push({ label:`夏季サプリメント £${accom.ihSummerSupp} × ${ihSummerWeeks}週`, local:ss });
        }
      }
    }
    // WSE: £60 first-week supplement for Student Houses & Serviced Rooms
    if (b.school==="wse" && accom.low>0 && !accom.halfBoard) {
      subLocal+=60; subItems.push({ label:`First week supplement (WSE)`, local:60 });
    }
    // WSE Christmas: £80/week for stays over 2-week Christmas period
    if (b.school==="wse" && hasChristmas(b.start,b.end)) {
      subLocal+=80; subItems.push({ label:`Christmas supplement (WSE) £80`, local:80 });
    }
    // St Giles: £38 Christmas supplement for half-board
    if (b.school!=="wse" && b.school!=="ih" && hasChristmas(b.start,b.end)) { subLocal+=38; subItems.push({ label:`Full-Board Christmas Supplement`, local:38 }); }
    // ELC: summer supplement for homestay
    if (b.school==="elc_brighton"||b.school==="elc_chester"||b.school==="elc_eastbourne") {
      const campD=getCampData(b.school,b.campus);
      if (campD?.peakStart) {
        const elcSummerWks=calcCustomSummerWeeks(b.start,b.end,campD.peakStart,campD.peakEnd);
        if (elcSummerWks>0&&campD.peakSupp>0) { subLocal+=campD.peakSupp*elcSummerWks; subItems.push({ label:`サマーサプリメント £${campD.peakSupp} × ${elcSummerWks}週`, local:campD.peakSupp*elcSummerWks }); }
      }
      // ELC: Christmas supplement £50 for lunches
      if (hasChristmas(b.start,b.end)&&accom.halfBoard) { subLocal+=50; subItems.push({ label:`Christmas supplement (ELC) £50`, local:50 }); }
    }
    // Manhattan: summer supplement $30/week (6/9-9/19)
    if (b.school==="manhattan") {
      const mhSummerWks=calcCustomSummerWeeks(b.start,b.end,"06-09","09-20");
      if (mhSummerWks>0) { subLocal+=30*mhSummerWks; subItems.push({ label:`夏季サプリメント $30 × ${mhSummerWks}週`, local:30*mhSummerWks }); }
    }
    // Rennert: summer supplement $35/week (6/1-8/30) for homestay only
    if (b.school==="rennert" && accom.rennertSummer) {
      const rSummerWks=calcCustomSummerWeeks(b.start,b.end,"06-01","08-31");
      if (rSummerWks>0) { subLocal+=35*rSummerWks; subItems.push({ label:`サマーサプリメント $35 × ${rSummerWks}週`, local:35*rSummerWks }); }
    }
    // Rennert: Christmas supplement $50 for homestay
    if (b.school==="rennert" && accom.rennertSummer && hasChristmas(b.start,b.end)) {
      subLocal+=50; subItems.push({ label:`Christmas supplement (Rennert) $50`, local:50 });
    }
    if (b.dietWeeks&&parseInt(b.dietWeeks)>0) {
      const dietRate = b.school==="wse" ? 50 : (b.school==="manhattan" ? 0 : 33);
      if (dietRate>0) { const d=dietRate*parseInt(b.dietWeeks); subLocal+=d; subItems.push({ label:`特別食追加 ${fmtC(dietRate,currency)} × ${b.dietWeeks}週`, local:d }); }
    }

    const grp=getGroup(b.school,b.campus);
    grp.items.push({ section:`Accommodation ${i+1}: ${accom.name}`, lines:subItems, subtotal:subLocal });
    grp.totalLocal+=subLocal;

    const el=document.getElementById("a"+b.id+"-sub");
    if(el) el.textContent=fmtC(subLocal,currency);
  });

  // ADDONS
  addonBlocks.forEach((b, i) => {
    let subLocal=0, currency="GBP";
    let subItems=[];
    const qty=parseFloat(b.qty||1);
    if (b.type==="transfer") {
      const cd=getCampData(b.school,b.campus);
      currency=b.school?getSchoolCurrency(b.school):"GBP";
      const price=cd&&b.airport?(cd.airports[b.airport]||0):0;
      subLocal=price*qty;
      subItems.push({ label:`${b.airport||"空港"}`, local:subLocal });
      if (b.school&&b.campus) {
        const grp=getGroup(b.school,b.campus);
        grp.items.push({ section:`Add-on ${i+1}: 空港送迎`, lines:subItems, subtotal:subLocal });
        grp.totalLocal+=subLocal;
      }
    } else if (b.type==="jpy-other") {
      // 円建てその他：為替換算せずfreeeに直接JPYとして追加
      const amtJPY = (parseFloat(b.amountJPY)||0)*qty;
      const label = b.desc || "その他費用";
      const el=document.getElementById("d"+b.id+"-sub");
      if(el) el.textContent=fmt(amtJPY);
      // JPY-only addon goes directly to freeeLines later
      b._jpyTotal = amtJPY;
      b._label = label;
      return;
    } else {
      currency=b.currency||"GBP";
      subLocal=(parseFloat(b.amount)||0)*qty;
      subItems.push({ label:b.desc||b.type, local:subLocal });
      const gKey="__addons__";
      if (!schoolGroups[gKey]) schoolGroups[gKey]={ label:"その他 Add-ons", currency, totalLocal:0, commissionLocal:0, items:[] };
      schoolGroups[gKey].items.push({ section:`Add-on ${i+1}: ${b.desc||b.type}`, lines:subItems, subtotal:subLocal });
      schoolGroups[gKey].totalLocal+=subLocal;
    }
    const el=document.getElementById("d"+b.id+"-sub");
    if(el) el.textContent=fmtC(subLocal,currency);
  });

  // PRIVATE LESSONS
  privLessonBlocks.forEach((b, i) => {
    if (!b.school||!b.campus||!b.lessons||!b.pricePerLesson) { const el=document.getElementById("pl"+b.id+"-sub"); if(el) el.textContent="—"; return; }
    const currency=getSchoolCurrency(b.school);
    const total=b.pricePerLesson*b.lessons;
    const commJPY=0; // commissionは後でgroupに積む
    const grp=getGroup(b.school,b.campus);
    grp.items.push({ section:`個人レッスン ${i+1}: ${b.lessons}回 @ ${fmtC(b.pricePerLesson,currency)}`, lines:[{label:`${b.lessons}レッスン × ${fmtC(b.pricePerLesson,currency)}`, local:total}], subtotal:total });
    grp.totalLocal+=total;
    grp.commissionLocal+=total*0.25;
    const el=document.getElementById("pl"+b.id+"-sub");
    if(el) el.textContent=fmtC(total,currency);
  });

  if (Object.keys(schoolGroups).length===0) { document.getElementById("result-section").style.display="none"; return; }

  // Build per-school JPY totals
  // TTS with buffer: effectiveFX = TTS × (1 + ttsMarkup%)
  // Program fee: costJPY × (1 + progMarkup%)
  const freeeLines = [];
  let grandTotalJPY=0, totalCommJPY=0, totalProgMarkupJPY=0, totalTTSMarkupJPY=0;

  Object.entries(schoolGroups).forEach(([key, grp]) => {
    const tts=getFxRate(grp.currency);
    const effectiveFX = tts * (1 + ttsMarkupPct/100);
    const costJPY = grp.totalLocal * tts;                        // 原価（TTS換算）
    const ttsGainJPY = grp.totalLocal * (effectiveFX - tts);    // TTS上乗せ分
    const progGainJPY = costJPY * (progMarkupPct/100);          // プログラム上乗せ分
    const programFee = Math.round(costJPY + ttsGainJPY + progGainJPY);
    const commJPY = Math.round(grp.commissionLocal * tts);
    grandTotalJPY += programFee;
    totalCommJPY += commJPY;
    totalProgMarkupJPY += Math.round(progGainJPY);
    totalTTSMarkupJPY += Math.round(ttsGainJPY);
    freeeLines.push({ label:`海外プログラム費用（${grp.label}・${grp.yrLabel}）`, jpy:programFee, currency:grp.currency, local:grp.totalLocal, tts, effectiveFX, costJPY, ttsGainJPY, progGainJPY, items:grp.items, commJPY });
  });

  if (coord>0) freeeLines.push({ label:`コーディネーション費用（¥150,000 × ${coordSchools}校）`, jpy:coord, isJPY:true });
  if (visa>0) freeeLines.push({ label:`ビザ申請費用${visaVal==="300000b"?" *":""}`, jpy:visa, isJPY:true });
  // 円建てその他Add-ons
  addonBlocks.filter(b=>b.type==="jpy-other"&&b._jpyTotal>0).forEach(b=>{
    freeeLines.push({ label:b._label, jpy:b._jpyTotal, isJPY:true });
    grandTotalJPY+=b._jpyTotal;
  });

  const totalAll=grandTotalJPY+coord+visa;
  const jpyOtherTotal = addonBlocks.filter(b=>b.type==="jpy-other").reduce((s,b)=>s+(b._jpyTotal||0),0);
  const grossProfit=totalCommJPY+coord+jpyOtherTotal;

  // freeeテーブル更新（学校ごとにセクション分け）
  let tbodyHtml="";
  freeeLines.forEach(l => {
    if (!l.isJPY) {
      // 学校ヘッダー行
      tbodyHtml+=`<tr style="background:#f0f5ff">
        <td colspan="4" style="padding:10px 8px;font-size:13px;font-weight:600;color:#1565c0;letter-spacing:0.02em">
          🏫 ${l.label}
        </td>
      </tr>`;
      // 明細行
      l.items && l.items.forEach(item => {
        item.lines && item.lines.forEach(ln => {
          tbodyHtml+=`<tr>
            <td style="padding:6px 8px 6px 20px;font-size:12px;color:#444">${ln.label}</td>
            <td style="text-align:center;font-size:12px">1名</td>
            <td style="text-align:right;font-size:12px">${fmtJPY(Math.round(ln.local * (l.tts||1)))}</td>
            <td style="text-align:right;font-size:12px">${fmtJPY(Math.round(ln.local * (l.tts||1)))}</td>
          </tr>`;
        });
      });
      // 学校小計行
      tbodyHtml+=`<tr style="background:#e8f0fe">
        <td colspan="2" style="padding:8px 8px 8px 20px;font-size:13px;font-weight:600">小計（${l.label}）</td>
        <td></td>
        <td style="text-align:right;font-size:13px;font-weight:600">${fmtJPY(l.jpy)}</td>
      </tr>`;
    } else {
      tbodyHtml+=`<tr>
        <td style="padding:8px">${l.label}</td>
        <td style="text-align:center">1名</td>
        <td style="text-align:right">${fmtJPY(l.jpy)}</td>
        <td style="text-align:right">${fmtJPY(l.jpy)}</td>
      </tr>`;
    }
  });
  tbodyHtml+=`<tr class="total-row" style="background:#1a1a18">
    <td colspan="2" style="padding:14px 8px;font-size:16px;font-weight:700;color:#fff">合計</td>
    <td></td>
    <td style="text-align:right;font-size:18px;font-weight:700;color:#fff">${fmtJPY(totalAll)}</td>
  </tr>`;
  document.getElementById("freee-tbody").innerHTML=tbodyHtml;
  document.getElementById("r-profit").textContent=fmtJPY(grossProfit);

  // 内訳
  let html="";
  freeeLines.filter(l=>!l.isJPY).forEach(l => {
    html+=`<div class="section-divider">${l.label}</div>`;
    html+=`<div class="breakdown-line"><span>原価合計 (${l.currency})</span><span class="bv">${fmtC(l.local,l.currency)}</span></div>`;
    html+=`<div class="breakdown-line"><span>× TTS ${l.tts} → 実効レート ${l.effectiveFX.toFixed(2)}（TTS+${ttsMarkupPct}%）</span><span class="bv">${fmt(l.costJPY+l.ttsGainJPY)}</span></div>`;
    if (progMarkupPct>0) html+=`<div class="breakdown-line"><span>プログラム上乗せ +${progMarkupPct}%</span><span class="bv">${fmt(l.progGainJPY)}</span></div>`;
    html+=`<div class="breakdown-line" style="font-weight:500"><span>→ 海外プログラム費用</span><span class="bv">${fmt(l.jpy)}</span></div>`;
    l.items.forEach(item => {
      html+=`<div style="margin:6px 0 2px; font-size:11px; color:#999; text-transform:uppercase;">${item.section}</div>`;
      item.lines.forEach(ln => {
        html+=`<div class="breakdown-line" style="padding-left:8px"><span>${ln.label}</span><span class="bv">${fmtC(ln.local,l.currency)}</span></div>`;
      });
    });
  });

  html+=`<div class="section-divider">粗利内訳</div>`;
  html+=`<div class="breakdown-line"><span>コミッション（授業料合計 × 25%）</span><span class="bv" style="color:#166534">${fmt(totalCommJPY)}</span></div>`;
  if (coord>0) html+=`<div class="breakdown-line"><span>コーディネーション費用（${coordSchools}校分）</span><span class="bv" style="color:#166534">${fmt(coord)}</span></div>`;
  addonBlocks.filter(b=>b.type==="jpy-other"&&(b._jpyTotal||0)>0).forEach(b=>{
    html+=`<div class="breakdown-line"><span>${b._label||"その他"}</span><span class="bv" style="color:#166534">${fmt(b._jpyTotal)}</span></div>`;
  });
  html+=`<div class="breakdown-line" style="font-weight:500; padding-top:6px; border-top:0.5px solid #bbf7d0"><span style="color:#166534">粗利合計</span><span class="bv" style="color:#166534">${fmt(grossProfit)}</span></div>`;
  if (visaVal==="300000b") html+=`<div style="font-size:11px;color:#888;margin-top:8px">* 翻訳等の実費は別途ご請求</div>`;

  document.getElementById("breakdown").innerHTML=html;
  document.getElementById("result-section").style.display="";

  window._lastResult={
    freeeLines, coord, visa, total:totalAll, grossProfit,
    coordSchools, visaNote:visaVal==="300000b",
    totalCommJPY, totalProgMarkupJPY, totalTTSMarkupJPY,
    progMarkupPct, ttsMarkupPct,
    client: document.getElementById("client-name").value,
    project: document.getElementById("project-name").value,
    quoteDate: document.getElementById("quote-date").value,
    gbpTTS: parseFloat(document.getElementById("fx-gbp").value)||200,
    usdTTS: parseFloat(document.getElementById("fx-usd").value)||155,
  };
}

function copyResult() {
  if (!window._lastResult) return;
  const r=window._lastResult;
  const lines=[];
  r.freeeLines.forEach(l => {
    lines.push(`${l.label}\t1名\t${Math.round(l.jpy).toLocaleString("ja-JP")}円\t${Math.round(l.jpy).toLocaleString("ja-JP")}円`);
  });
  lines.push(`合計\t\t\t${Math.round(r.total).toLocaleString("ja-JP")}円`);
  navigator.clipboard.writeText(lines.join("\n")).then(()=>{
    const btn=document.querySelector(".copy-btn");
    const orig=btn.textContent;
    btn.textContent="コピーしました！";
    setTimeout(()=>btn.textContent=orig, 2000);
  });
}

// ===================== SAVE / LOAD / EXCEL =====================
const STORAGE_KEY = "getc_quotes_v2";

function loadSavedQuotes() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]"); } catch(e) { return []; }
}
function saveSavedQuotes(quotes) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(quotes));
}

function saveQuote() {
  if (!window._lastResult) { alert("先に計算してください"); return; }
  const r = window._lastResult;
  const client = document.getElementById("client-name").value || "（未設定）";
  const project = document.getElementById("project-name").value || "（未設定）";
  const date = document.getElementById("quote-date").value || new Date().toISOString().split("T")[0];
  const age = document.getElementById("person-age").value || "";
  const nationality = document.getElementById("person-nationality").value || "";
  const countryEl = document.getElementById("person-country");
  const country = countryEl ? countryEl.value : "";
  const author = document.getElementById("author-name").value || "";
  const authorDate = document.getElementById("author-date").value || "";
  const reviewer = document.getElementById("reviewer-name").value || "";
  const reviewerDate = document.getElementById("reviewer-date").value || "";

  const quote = {
    id: Date.now(),
    client, project, date,
    age, nationality, country,
    author, authorDate, reviewer, reviewerDate,
    freeeLines: r.freeeLines.map(l=>({
      label:l.label, jpy:l.jpy, isJPY:l.isJPY||false,
      currency:l.currency, local:l.local, tts:l.tts,
      items:l.items
    })),
    coord: r.coord, visa: r.visa, total: r.total, grossProfit: r.grossProfit,
    totalCommJPY: r.totalCommJPY||0,
    totalProgMarkupJPY: r.totalProgMarkupJPY||0,
    totalTTSMarkupJPY: r.totalTTSMarkupJPY||0,
    progMarkupPct: r.progMarkupPct||0,
    ttsMarkupPct: r.ttsMarkupPct||0,
    gbpTTS: r.gbpTTS||0, usdTTS: r.usdTTS||0,
    visaNote: r.visaNote||false,
  };

  const quotes = loadSavedQuotes();
  quotes.unshift(quote);
  saveSavedQuotes(quotes);
  renderSavedQuotes();
  alert(`「${client} / ${project}」を保存しました`);
}

function deleteQuote(id) {
  const quotes = loadSavedQuotes().filter(q=>q.id!==id);
  saveSavedQuotes(quotes);
  renderSavedQuotes();
}

function clearAllQuotes() {
  if (!confirm("保存済み見積もりを全件削除しますか？")) return;
  localStorage.removeItem(STORAGE_KEY);
  renderSavedQuotes();
}

function renderSavedQuotes() {
  const el = document.getElementById("saved-quotes-list");
  const quotes = loadSavedQuotes();
  if (quotes.length===0) {
    el.innerHTML=`<div style="font-size:13px;color:#999;text-align:center;padding:8px 0">保存済みの見積もりはありません</div>`;
    return;
  }
  el.innerHTML=`
    <div style="margin-bottom:8px;display:flex;gap:8px;align-items:center">
      <label style="font-size:12px;color:#666"><input type="checkbox" id="select-all-quotes" onchange="toggleAllQuotes(this.checked)"> 全選択</label>
      <button class="btn btn-sm" onclick="exportSelectedExcel()">✅ 選択をExcelで出力</button>
      <button class="btn btn-sm" onclick="exportCurrentExcel()">📥 今の見積をExcelで出力</button>
    </div>
    <table style="width:100%;font-size:12px;border-collapse:collapse">
    <thead><tr style="border-bottom:0.5px solid #e0e0dc">
      <th style="padding:4px 6px;width:28px"></th>
      <th style="text-align:left;padding:4px 8px;color:#888;font-weight:500">日付</th>
      <th style="text-align:left;padding:4px 8px;color:#888;font-weight:500">クライアント</th>
      <th style="text-align:left;padding:4px 8px;color:#888;font-weight:500">案件名</th>
      <th style="text-align:right;padding:4px 8px;color:#888;font-weight:500">合計</th>
      <th style="text-align:right;padding:4px 8px;color:#888;font-weight:500">粗利</th>
      <th style="padding:4px 8px"></th>
    </tr></thead>
    <tbody>
    ${quotes.map(q=>`<tr style="border-bottom:0.5px solid #f0f0ec">
      <td style="padding:6px 6px;text-align:center"><input type="checkbox" class="quote-checkbox" data-id="${q.id}"></td>
      <td style="padding:6px 8px;white-space:nowrap">${q.date}</td>
      <td style="padding:6px 8px">${q.client}</td>
      <td style="padding:6px 8px">${q.project}</td>
      <td style="padding:6px 8px;text-align:right;font-weight:500">${Math.round(q.total/10000)}万円</td>
      <td style="padding:6px 8px;text-align:right;color:#166534">${Math.round(q.grossProfit/10000)}万円</td>
      <td style="padding:6px 8px;text-align:right;white-space:nowrap">
        <button class="btn btn-sm btn-danger" onclick="deleteQuote(${q.id})">削除</button>
      </td>
    </tr>`).join("")}
    </tbody></table>`;
}

function toggleAllQuotes(checked) {
  document.querySelectorAll(".quote-checkbox").forEach(cb=>cb.checked=checked);
}

// 現在の見積をExcelで出力
function exportCurrentExcel() {
  if (!window._lastResult) { alert("先に計算してください"); return; }
  const r = window._lastResult;
  const client = document.getElementById("client-name").value || "見積";
  const project = document.getElementById("project-name").value || "";
  const date = document.getElementById("quote-date").value || new Date().toISOString().split("T")[0];
  _exportToExcel([{
    client, project, date,
    freeeLines: r.freeeLines, coord: r.coord, visa: r.visa,
    total: r.total, grossProfit: r.grossProfit,
    totalCommJPY: r.totalCommJPY||0, progMarkupPct: r.progMarkupPct||0,
    ttsMarkupPct: r.ttsMarkupPct||0, gbpTTS: r.gbpTTS||0, usdTTS: r.usdTTS||0,
  }], `GETC_見積_${client}_${date}`);
}

function exportSelectedExcel(all=false) {
  const quotes = loadSavedQuotes();
  if (quotes.length===0) { alert("保存済みの見積もりがありません"); return; }
  let targets;
  if (all) {
    targets = quotes;
  } else {
    const checked = [...document.querySelectorAll(".quote-checkbox:checked")].map(cb=>parseInt(cb.dataset.id));
    targets = quotes.filter(q=>checked.includes(q.id));
    if (targets.length===0) { alert("出力する見積もりを選択してください"); return; }
  }
  _exportToExcel(targets, `GETC_見積一覧_${new Date().toISOString().split("T")[0]}`);
}

function exportExcel() { exportSelectedExcel(true); }

function _exportToExcel(targets, filename) {
  // Excelに貼り付けやすいHTML形式で出力
  // 各見積もりをシート内に縦に並べ、単価×週数の計算式付き
  let rows = [];

  // ヘッダー
  rows.push(["GETC 海外プログラム見積書", "", "", "", "", "", ""]);
  rows.push([]);

  targets.forEach(q => {
    rows.push([`■ ${q.client}　${q.project}　${q.date}`]);
    rows.push(["摘要", "数量", "外貨単価", "通貨", "レート", "単価（円）", "金額（円）"]);

    q.freeeLines.forEach(l => {
      if (!l.isJPY && l.items) {
        // 学校ヘッダー
        rows.push([`【${l.label}】`, "", "", l.currency||"", l.tts||"", "", l.jpy]);
        // 明細
        l.items && l.items.forEach(item => {
          item.lines && item.lines.forEach(ln => {
            const localAmt = ln.local || 0;
            const tts = l.tts || 1;
            const jpyAmt = Math.round(localAmt * tts);
            rows.push([
              `　${ln.label}`,
              1,
              localAmt,
              l.currency||"",
              tts,
              jpyAmt,
              `=${String.fromCharCode(66)}${rows.length+1}*${String.fromCharCode(69)}${rows.length+1}`,
            ]);
          });
        });
      } else {
        rows.push([l.label, 1, "", "JPY", 1, l.jpy, l.jpy]);
      }
    });

    rows.push(["合計", "", "", "", "", "", Math.round(q.total)]);
    rows.push(["粗利（コミッション＋コーディネーション）", "", "", "", "", "", Math.round(q.grossProfit)]);
    rows.push([]);
  });

  // CSV with BOM
  const csvContent = "\uFEFF" + rows
    .map(row => row.map(v => `"${String(v||"").replace(/"/g,'""')}"`).join(","))
    .join("\r\n");

  const blob = new Blob([csvContent], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${filename}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
